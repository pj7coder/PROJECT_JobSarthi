<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Applicants - JobSarthi</title>
  <meta name="description" content="View incoming applications, read AI screening notes, and manage candidate hiring stages.">
  <link rel="stylesheet" href="../css/main.css">
  <script src="https://unpkg.com/lucide@0.511.0/dist/umd/lucide.min.js" integrity="sha384-YCxwI7HW+hlnktW3yOnKN44k9F/E859McBSCz+NoK45Sww88vGY9Kqfdo794td6J" crossorigin="anonymous"></script>
  <script>
    if (localStorage.getItem('recruiter_logged_in') !== 'true') {
      window.location.replace('login_signup.html');
    }
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme && savedTheme !== 'dark') {
      document.documentElement.classList.add(savedTheme + '-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add(savedTheme + '-theme');
      });
    }
  </script>
  <style>
    .applicants-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 30px;
      margin-top: 30px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .applicants-layout {
        grid-template-columns: 1fr;
      }
    }

    .sidebar-filter-panel {
      position: sticky;
      top: 90px;
      height: fit-content;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }

    @media (max-width: 900px) {
      .sidebar-filter-panel {
        position: relative !important;
        top: 0 !important;
      }
    }

    .stage-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.02) !important;
      border: 1px solid var(--glass-border) !important;
      color: var(--text-muted) !important;
      transition: var(--transition-normal);
    }

    .stage-tab:hover {
      background: rgba(255, 255, 255, 0.06) !important;
      color: var(--text-main) !important;
    }

    .stage-tab.active {
      background: var(--accent-secondary) !important;
      color: #ffffff !important;
      border-color: var(--accent-secondary) !important;
      box-shadow: 0 0 12px rgba(217, 70, 239, 0.3) !important;
    }

    .applicant-item {
      padding: 24px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
      transition: var(--transition-normal);
    }

    @media (max-width: 750px) {
      .applicant-item {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .applicant-avatar {
        margin: 0 auto;
      }
      .applicant-actions {
        justify-content: center;
        width: 100%;
      }
    }

    .applicant-item:hover {
      border-color: rgba(217, 70, 239, 0.25);
      box-shadow: 0 8px 25px -10px rgba(217, 70, 239, 0.15);
    }

    .applicant-avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .applicant-info h3 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .applicant-info .applied-for {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .applicant-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .applicant-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .score-badge {
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* Resume Drawer */
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: flex-end;
    }

    .drawer-content {
      width: 550px;
      height: 100%;
      background: #0f1016;
      border-left: 1px solid var(--glass-border);
      box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-y: auto;
      animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .drawer-close {
      cursor: pointer;
      color: var(--text-muted);
      margin-bottom: 24px;
      display: inline-flex;
    }

    .ai-review-box {
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.25);
      padding: 16px;
      border-radius: var(--radius-md);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1" style="background: radial-gradient(circle, rgba(217, 70, 239, 0.1) 0%, rgba(0,0,0,0) 70%);"></div>
  <div class="bg-glow-2"></div>

  <!-- Recruiter Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container">


    <div class="applicants-layout">
      <!-- Left Side: Sidebar Filter & Status Tabs Panel (Sticky/Static) -->
      <aside class="glass-panel sidebar-filter-panel" style="margin-top: 30px;">
        <h2 style="font-size: 1.15rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 10px; font-weight: 700;">Filters & Stages</h2>
        
        <!-- Stages / Tabs -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <span style="color: var(--text-muted); font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;">Application Stage</span>
          <button class="btn btn-secondary stage-tab active" id="tab-all" onclick="setStageFilter('all')" style="justify-content: flex-start; text-align: left; padding: 10px 14px; font-size: 0.85rem; width: 100%;">📁 All Applicants</button>
          <button class="btn btn-secondary stage-tab" id="tab-shortlisted" onclick="setStageFilter('Shortlisted')" style="justify-content: flex-start; text-align: left; padding: 10px 14px; font-size: 0.85rem; width: 100%;">🟢 Accepted / Shortlisted</button>
          <button class="btn btn-secondary stage-tab" id="tab-interviewing" onclick="setStageFilter('Interviewing')" style="justify-content: flex-start; text-align: left; padding: 10px 14px; font-size: 0.85rem; width: 100%;">🔵 Interviewing</button>
          <button class="btn btn-secondary stage-tab" id="tab-rejected" onclick="setStageFilter('Rejected')" style="justify-content: flex-start; text-align: left; padding: 10px 14px; font-size: 0.85rem; width: 100%;">🔴 Rejected</button>
        </div>

        <!-- Role Filter -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label for="roleFilter" style="color: var(--text-muted); font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px;">Filter by Role</label>
          <select id="roleFilter" class="form-control" style="width: 100%; padding: 8px 12px; background: rgba(0, 0, 0, 0.2); color: var(--text-main); border: 1px solid var(--border-subtle); border-radius: 6px;" onchange="renderApplicants()">
            <option value="all">All Roles</option>
            <option value="Frontend Developer">Frontend Developer</option>
            <option value="UI/UX Designer">UI/UX Designer</option>
            <option value="Python Developer">Python Developer</option>
          </select>
        </div>

        <!-- Sort Filter -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label for="sortFilter" style="color: var(--text-muted); font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px;">Sort by</label>
          <select id="sortFilter" class="form-control" style="width: 100%; padding: 8px 12px; background: rgba(0, 0, 0, 0.2); color: var(--text-main); border: 1px solid var(--border-subtle); border-radius: 6px;" onchange="renderApplicants()">
            <option value="matchDesc">Match Score: High to Low</option>
            <option value="matchAsc">Match Score: Low to High</option>
            <option value="name">Candidate Name</option>
          </select>
        </div>
      </aside>

      <!-- Right Side: Scrollable Applicants Board -->
      <section class="applicants-list-container" id="applicantsContainer" style="display: flex; flex-direction: column; gap: 20px; margin-top: 30px;">
        <!-- Items loaded via script -->
      </section>
    </div>
  </main>

  <!-- Candidate Details Drawer -->
  <div class="drawer-overlay" id="candidateDrawer" onclick="closeDrawer(event)">
    <div class="drawer-content" onclick="event.stopPropagation()">
      <div>
        <div class="drawer-close" onclick="closeDrawer(null)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>

        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 30px;">
          <div class="applicant-avatar" id="drawerAvatar" style="width: 64px; height: 64px; font-size: 1.8rem;">A</div>
          <div>
            <h2 id="drawerName" style="font-size: 1.4rem;">Candidate Name</h2>
            <div id="drawerAppliedRole" style="color: var(--accent-tertiary); font-weight: 600;">Applied Role</div>
          </div>
        </div>

        <!-- AI Screening Box -->
        <div class="ai-review-box">
          <div style="display: flex; align-items: center; gap: 8px; font-weight: 700; color: #818cf8; margin-bottom: 8px;">
            <i data-lucide="cpu" style="width: 18px; height: 18px;"></i> Sarthi AI Fit Analysis
          </div>
          <p id="drawerAiNote" style="font-size: 0.9rem; line-height: 1.5; color: var(--text-main);">
            Analyzing...
          </p>
        </div>

        <div style="margin-top: 24px;">
          <h3 style="font-size: 1.05rem; margin-bottom: 8px;">Skills & Verifications</h3>
          <div class="applicant-skills" id="drawerSkills">
            <!-- Badges -->
          </div>
        </div>

        <div style="margin-top: 24px;">
          <h3 style="font-size: 1.05rem; margin-bottom: 8px;">Candidate Statement</h3>
          <p style="color: var(--text-muted); font-size: 0.92rem; line-height: 1.5;" id="drawerStatement">
            Candidate statement description goes here.
          </p>
        </div>
      </div>

      <!-- Action Footer -->
      <div style="margin-top: 40px; display: flex; gap: 12px;" id="drawerActions">
        <!-- Buttons loaded based on context -->
      </div>
    </div>
  </div>

  <script>
    let selectedCandidate = null;
    let applicantsList = [];
    let activeStageFilter = 'all';

    function setStageFilter(stage) {
      activeStageFilter = stage;
      document.querySelectorAll('.stage-tab').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('tab-' + stage.toLowerCase());
      if (activeBtn) activeBtn.classList.add('active');
      renderApplicants();
    }

    document.addEventListener("DOMContentLoaded", () => {
      const comp = localStorage.getItem('recruiter_company') || 'InnovateTech';
      
      const urlParams = new URLSearchParams(window.location.search);
      const roleParam = urlParams.get('role');
      const candidateParam = urlParams.get('candidateId');
      
      if (roleParam) {
        const select = document.getElementById('roleFilter');
        if (select) {
          let optionExists = false;
          for (let i = 0; i < select.options.length; i++) {
            if (select.options[i].value === roleParam) {
              optionExists = true;
              break;
            }
          }
          if (!optionExists) {
            const opt = document.createElement('option');
            opt.value = roleParam;
            opt.textContent = roleParam;
            select.appendChild(opt);
          }
          select.value = roleParam;
        }
      }
      
      loadApplicants(comp).then(() => {
        if (candidateParam) {
          openCandidateDrawer(candidateParam);
        }
      });
    });

    async function loadApplicants(companyName) {
      try {
        const email = localStorage.getItem('recruiter_email') || '';
        const response = await fetch((window.API_BASE_URL || '') + `/api/recruiter/applicants?company=${encodeURIComponent(companyName)}&email=${encodeURIComponent(email)}`);
        if (!response.ok) throw new Error("Failed to fetch");
        applicantsList = await response.json();
        renderApplicants();
      } catch (err) {
        console.error(err);
        document.getElementById('applicantsContainer').innerHTML = `
          <div class="glass-panel" style="padding: 40px; text-align: center; color: var(--danger);">
            Failed to load applicants from server.
          </div>
        `;
      }
    }

    function renderApplicants() {
      const container = document.getElementById('applicantsContainer');
      container.innerHTML = '';

      const roleFilter = document.getElementById('roleFilter').value;
      const sortFilter = document.getElementById('sortFilter').value;

      // Dynamically populate role filter options from loaded data
      const roleSelect = document.getElementById('roleFilter');
      const existingRoles = new Set(['all']);
      for (let i = 0; i < roleSelect.options.length; i++) existingRoles.add(roleSelect.options[i].value);
      applicantsList.forEach(c => {
        if (c.role && !existingRoles.has(c.role)) {
          existingRoles.add(c.role);
          const opt = document.createElement('option');
          opt.value = c.role;
          opt.textContent = c.role;
          roleSelect.appendChild(opt);
        }
      });

      // Filter
      let filtered = applicantsList.filter(c => {
        if (activeStageFilter !== 'all' && c.status !== activeStageFilter) return false;
        if (roleFilter === 'all') return true;
        return c.role === roleFilter;
      });

      // Sort
      filtered.sort((a, b) => {
        if (sortFilter === 'matchDesc') return b.match - a.match;
        if (sortFilter === 'matchAsc') return a.match - b.match;
        if (sortFilter === 'name') return a.name.localeCompare(b.name);
        return 0;
      });

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="glass-panel" style="padding: 40px; text-align: center; color: var(--text-dark);">
            No applicants found matching this filter setting.
          </div>
        `;
        return;
      }

      filtered.forEach(c => {
        const item = document.createElement('div');
        item.className = 'glass-panel applicant-item';
        
        // Color-code score: green>=80, blue>=65, red<65
        let scoreStyle = 'background: rgba(59,130,246,0.1); color: var(--accent-secondary); border: 1px solid rgba(59,130,246,0.3);';
        if (c.match >= 80) {
          scoreStyle = 'background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.3);';
        } else if (c.match < 65) {
          scoreStyle = 'background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3);';
        }

        let badgeStatus = `<span class="badge badge-warning">${c.status}</span>`;
        if (c.status === 'Interviewing') {
          badgeStatus = `<span class="badge badge-primary">${c.status}</span>`;
        } else if (c.status === 'Shortlisted') {
          badgeStatus = `<span class="badge badge-success">${c.status}</span>`;
        } else if (c.status === 'Rejected') {
          badgeStatus = `<span class="badge badge-danger">${c.status}</span>`;
        }

        const avatarHtml = c.avatarUrl 
          ? `<img src="${c.avatarUrl}" alt="${c.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />`
          : c.name.split(' ').map(n=>n[0]).join('').toUpperCase();

        const skillsList = Array.isArray(c.skills) ? c.skills : (typeof c.skills === 'string' ? c.skills.split(',') : []);

        item.innerHTML = `
          <div class="applicant-avatar">${avatarHtml}</div>
          <div class="applicant-info">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
              <h3>${c.name}</h3>
              ${badgeStatus}
            </div>
            <div class="applied-for">Applied for: <strong>${c.role}</strong></div>
            <div class="applicant-skills">
              ${skillsList.slice(0,6).map(s => `<span class="badge" style="background: rgba(255,255,255,0.03); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05); text-transform:none;">${String(s).trim()}</span>`).join('')}
              ${skillsList.length > 6 ? `<span class="badge" style="color: var(--text-dark); border: 1px solid var(--border-subtle);">+${skillsList.length - 6} more</span>` : ''}
            </div>
          </div>
          <div class="applicant-actions" style="display: flex; align-items: center; gap: 8px;">
            <span class="score-badge" style="${scoreStyle}">${c.match}% Fit</span>
            <button class="btn btn-details-animated" onclick="openCandidateDrawer('${c.id}')">View Profile</button>
            <button class="btn btn-icon btn-accept" onclick="updateCandidateStatusDirect('${c.id}', 'Shortlisted')" title="Accept / Shortlist" style="background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); width: 36px; height: 36px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(16, 185, 129, 0.2)'" onmouseout="this.style.background='rgba(16, 185, 129, 0.1)'">
              <i data-lucide="check" style="width: 18px; height: 18px;"></i>
            </button>
            <button class="btn btn-icon btn-reject" onclick="updateCandidateStatusDirect('${c.id}', 'Rejected')" title="Reject" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); width: 36px; height: 36px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'" onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'">
              <i data-lucide="x" style="width: 18px; height: 18px;"></i>
            </button>
          </div>
        `;

        container.appendChild(item);
      });
      if (window.lucide) {
        lucide.createIcons();
      }
    }

    function openCandidateDrawer(id) {
      selectedCandidate = applicantsList.find(c => c.id === id);
      if (!selectedCandidate) return;

      if (selectedCandidate.avatarUrl) {
        document.getElementById('drawerAvatar').innerHTML = `<img src="${selectedCandidate.avatarUrl}" alt="${selectedCandidate.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />`;
      } else {
        document.getElementById('drawerAvatar').textContent = selectedCandidate.name.split(' ').map(n=>n[0]).join('');
      }
      document.getElementById('drawerName').textContent = selectedCandidate.name;
      document.getElementById('drawerAppliedRole').textContent = `Applied for: ${selectedCandidate.role}`;
      
      let badgeHtml = selectedCandidate.skills.map(s => `<span class="badge" style="background: rgba(255,255,255,0.03); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05); text-transform:none; margin-right:4px;">${s}</span>`).join('');
      document.getElementById('drawerSkills').innerHTML = badgeHtml;

      // Fit Index note - contextual by score range
      const sc = selectedCandidate.match;
      const skillsList = Array.isArray(selectedCandidate.skills)
        ? selectedCandidate.skills
        : (typeof selectedCandidate.skills === 'string' ? selectedCandidate.skills.split(',') : []);
      let fitNote = '';
      if (sc >= 85) {
        fitNote = `<strong>${sc}% Match —</strong> Excellent candidate alignment. ${selectedCandidate.name} closely matches the technical requirements for <em>${selectedCandidate.role}</em>. Their skills (${skillsList.slice(0,3).join(', ')}) align strongly with the role. <strong>Highly recommended</strong> for fast-track shortlisting.`;
      } else if (sc >= 70) {
        fitNote = `<strong>${sc}% Match —</strong> Good candidate fit for <em>${selectedCandidate.role}</em>. ${selectedCandidate.name} covers most technical requirements. A brief screening call is recommended to verify depth of experience.`;
      } else if (sc >= 55) {
        fitNote = `<strong>${sc}% Match —</strong> Moderate alignment. ${selectedCandidate.name} meets some core qualifications for <em>${selectedCandidate.role}</em> but may require additional technical assessment or training.`;
      } else {
        fitNote = `<strong>${sc}% Match —</strong> Low technical overlap with the <em>${selectedCandidate.role}</em> position. ${selectedCandidate.name} may be better suited for a different role or requires significant upskilling.`;
      }
      document.getElementById('drawerAiNote').innerHTML = fitNote;
      
      // Update Candidate statement with details
      document.getElementById('drawerStatement').innerHTML = `
        <div style="margin-bottom: 12px;">
          <strong>College:</strong> ${selectedCandidate.college}<br>
          <strong>Degree:</strong> ${selectedCandidate.degree} (${selectedCandidate.cgpa ? 'CGPA: ' + selectedCandidate.cgpa : 'No CGPA'})
        </div>
        <div style="margin-bottom: 16px;">
          <strong>Experience Summary:</strong><br>
          ${selectedCandidate.statement}
        </div>
        ${selectedCandidate.resumeUrl ? `
          <div style="margin-bottom: 16px;">
            <strong>Uploaded Resume:</strong><br>
            <a href="/api/resume/view?url=${encodeURIComponent(selectedCandidate.resumeUrl)}" target="_blank" class="btn btn-secondary" style="display:inline-flex; align-items:center; gap:8px; padding:6px 12px; font-size:0.85rem; margin-top:4px;">
              📄 ${selectedCandidate.resumeFileName || "View Resume"} (View/Download)
            </a>
          </div>
        ` : ''}
        ${selectedCandidate.certificates && selectedCandidate.certificates.length > 0 ? `
          <div>
            <strong>Uploaded Certificates:</strong><br>
            ${selectedCandidate.certificates.map(cert => `
              <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: var(--radius-sm); margin-top: 6px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size:0.85rem;">🏆 ${cert.title}</span>
                <a href="/api/resume/view?url=${encodeURIComponent(cert.fileUrl)}" target="_blank" style="color: var(--accent-secondary); font-size: 0.8rem; font-weight:600; text-decoration: underline;">View File</a>
              </div>
            `).join('')}
          </div>
        ` : ''}
      `;

      // Actions Footer
      const actionsDiv = document.getElementById('drawerActions');
      actionsDiv.innerHTML = '';

      if (selectedCandidate.status !== 'Shortlisted') {
        const b1 = document.createElement('button');
        b1.className = 'btn btn-glow';
        b1.style.flex = '1';
        b1.textContent = 'Shortlist Candidate';
        b1.onclick = () => updateCandidateStatus('Shortlisted');
        actionsDiv.appendChild(b1);
      }

      // Always show Schedule Interview button in the candidate profile details
      const b2 = document.createElement('button');
      b2.className = 'btn btn-primary';
      b2.style.flex = '1';
      b2.style.background = 'var(--accent-secondary)';
      b2.style.color = '#ffffff';
      b2.textContent = 'Schedule Interview';
      b2.onclick = () => openScheduleModal();
      actionsDiv.appendChild(b2);

      if (selectedCandidate.status !== 'Rejected') {
        const b3 = document.createElement('button');
        b3.className = 'btn btn-secondary';
        b3.style.color = 'var(--danger)';
        b3.textContent = 'Reject';
        b3.onclick = () => updateCandidateStatus('Rejected');
        actionsDiv.appendChild(b3);
      }

      document.getElementById('candidateDrawer').style.display = 'flex';
    }

    function closeDrawer(event) {
      if (event === null || event.target === document.getElementById('candidateDrawer')) {
        document.getElementById('candidateDrawer').style.display = 'none';
      }
    }

    async function updateCandidateStatus(status) {
      if (!selectedCandidate) return;

      try {
        const response = await fetch((window.API_BASE_URL || '') + `/api/recruiter/applicants/${selectedCandidate.id}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (!response.ok) throw new Error("Failed to update status");
        
        selectedCandidate.status = status;
        document.getElementById('candidateDrawer').style.display = 'none';
        
        const comp = localStorage.getItem('recruiter_company') || 'InnovateTech';
        loadApplicants(comp);
      } catch (err) {
        console.error(err);
        alert("Failed to update status on server.");
      }
    }

    async function updateCandidateStatusDirect(id, status) {
      try {
        const response = await fetch((window.API_BASE_URL || '') + `/api/recruiter/applicants/${id}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (!response.ok) throw new Error("Failed to update status");
        
        const candidate = applicantsList.find(c => c.id === id);
        if (candidate) {
          candidate.status = status;
        }
        renderApplicants();
      } catch (err) {
        console.error(err);
        alert("Failed to update status on server.");
      }
    }

    function openScheduleModal() {
      if (!selectedCandidate) return;
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const yyyy = tomorrow.getFullYear();
      const mm = String(tomorrow.getMonth() + 1).padStart(2, '0');
      const dd = String(tomorrow.getDate()).padStart(2, '0');
      document.getElementById('interviewDate').value = `${yyyy}-${mm}-${dd}`;
      document.getElementById('interviewTime').value = "15:00";
      
      document.getElementById('scheduleModal').style.display = 'flex';
    }

    function closeScheduleModal() {
      document.getElementById('scheduleModal').style.display = 'none';
    }

    async function confirmScheduleInterview() {
      const dateVal = document.getElementById('interviewDate').value;
      const timeVal = document.getElementById('interviewTime').value;
      if (!dateVal || !timeVal) {
        alert("Please select both a date and a time.");
        return;
      }

      const dateObj = new Date(dateVal);
      const formattedDate = dateObj.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      const [hours, minutes] = timeVal.split(':');
      const suffix = Number(hours) >= 12 ? 'PM' : 'AM';
      const formattedHours = ((Number(hours) + 11) % 12 + 1);
      const formattedTime = `${formattedHours}:${minutes} ${suffix}`;

      if (!selectedCandidate) return;
      
      const recruiterEmail = localStorage.getItem('recruiter_email');
      const recruiterCompany = localStorage.getItem('recruiter_company') || 'Company';
      const finalRecruiterName = recruiterCompany + ' HR';
      
      const inviteMsg = `📅 <strong>Interview Scheduled:</strong> An interview invitation has been generated for ${formattedDate} at ${formattedTime} (IST). Please check your email calendar details.`;

      closeScheduleModal();
      document.getElementById('candidateDrawer').style.display = 'none';

      try {
        // 1. Update candidate status to 'Interviewing' on the server
        const statusResponse = await fetch((window.API_BASE_URL || '') + `/api/recruiter/applicants/${selectedCandidate.id}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'Interviewing' })
        });
        if (!statusResponse.ok) throw new Error("Failed to update status");

        // 2. Send message to seeker on the server
        const msgResponse = await fetch((window.API_BASE_URL || '') + '/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            seekerEmail: selectedCandidate.email,
            seekerName: selectedCandidate.name,
            recruiterEmail: recruiterEmail,
            recruiterName: finalRecruiterName,
            companyName: recruiterCompany,
            sender: 'recruiter',
            text: inviteMsg
          })
        });
        if (!msgResponse.ok) throw new Error("Failed to send invite message");

        // 3. Add event to recruiter's calendar (local storage)
        const events = JSON.parse(localStorage.getItem('recruiter_calendar_events') || '{}');
        if (!events[dateVal]) {
          events[dateVal] = [];
        }
        const exists = events[dateVal].some(ev => ev.title.includes(selectedCandidate.name));
        if (!exists) {
          events[dateVal].push({
            type: 'interview',
            title: `Interview with ${selectedCandidate.name} (${selectedCandidate.role})`,
            time: formattedTime
          });
          localStorage.setItem('recruiter_calendar_events', JSON.stringify(events));
        }

        // Reload applicants
        const comp = localStorage.getItem('recruiter_company') || 'InnovateTech';
        loadApplicants(comp);
        
        alert(`Interview successfully scheduled with ${selectedCandidate.name} for ${formattedDate} at ${formattedTime}!`);
      } catch (err) {
        console.error("Error scheduling interview:", err);
        alert('Failed to schedule interview. Please try again.');
      }
    }
  
  </script>

  <!-- Schedule Interview Modal -->
  <div class="drawer-overlay" id="scheduleModal" style="display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.75); z-index: 100000; padding: 20px;">
    <div class="glass-panel" style="width: 400px; max-width: 100%; padding: 28px; display: flex; flex-direction: column; gap: 20px; box-shadow: none !important; background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 12px;">
      <h3 style="font-size: 1.2rem; font-weight: 700; color: var(--text-main); margin: 0;">Schedule Interview</h3>
      
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Select Date</label>
        <input type="date" id="interviewDate" class="form-control" style="width: 100%; background: var(--bg-primary); color: var(--text-main); border: 1px solid var(--border-subtle); padding: 8px 12px; border-radius: 6px;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 6px;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Select Time</label>
        <input type="time" id="interviewTime" class="form-control" style="width: 100%; background: var(--bg-primary); color: var(--text-main); border: 1px solid var(--border-subtle); padding: 8px 12px; border-radius: 6px;">
      </div>

      <div style="display: gap: 12px; margin-top: 8px; display: flex;">
        <button class="btn btn-secondary" style="flex: 1; padding: 10px; border-radius: 6px;" onclick="closeScheduleModal()">Cancel</button>
        <button class="btn btn-primary" style="flex: 1; padding: 10px; border-radius: 6px; background: var(--accent-secondary); color: #ffffff;" onclick="confirmScheduleInterview()">Schedule</button>
      </div>
    </div>
  </div>
  
  <script src="../js/header.js"></script>


</body>
</html>
