<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Authentication - JobSarthi</title>
  <meta name="description" content="Sign in or register for an employer account on JobSarthi to start recruiting.">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top right, #1f122e 0%, #06050a 100%);
      padding: 20px;
    }

    .auth-container {
      max-width: 480px;
      width: 100%;
      position: relative;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
      transition: var(--transition-fast);
    }

    .back-btn:hover {
      color: var(--accent-tertiary);
      transform: translateX(-4px);
    }

    .auth-panel {
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    /* Animate UI Tabs & Card Redesign */
    .tabs-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .tabs-list {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      padding: 4px;
      border-radius: var(--radius-full);
      width: 100%;
      position: relative;
    }

    .tabs-trigger {
      flex: 1;
      text-align: center;
      padding: 10px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-full);
      transition: color 0.3s ease;
      position: relative;
      z-index: 2;
      border: none;
      background: transparent;
      outline: none;
    }

    .tabs-trigger.active {
      color: var(--text-main);
    }

    .tabs-indicator {
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 4px;
      width: calc(50% - 4px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(217, 70, 239, 0.25);
      border-radius: var(--radius-full);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1;
      pointer-events: none;
    }

    .animate-card {
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card-header {
      padding: 32px 32px 16px 32px;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .card-description {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-content {
      padding: 12px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-footer {
      padding: 16px 32px 32px 32px;
    }

    /* Form Transitions */
    .tabs-content {
      display: none;
      opacity: 0;
      transform: translateY(8px);
    }

    .tabs-content.active {
      display: block;
      animation: tabFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes tabFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="auth-body">
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1" style="background: radial-gradient(circle, rgba(217, 70, 239, 0.15) 0%, rgba(0,0,0,0) 70%);">
  </div>

  <div class="auth-container">
    <a href="../index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Portal Choice
    </a>

    <div class="logo" style="justify-content: center; margin-bottom: 30px;">
      <div class="logo-icon"
        style="background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-tertiary) 100%);">S</div>
      JobSarthi <span
        style="font-size: 0.85rem; padding: 2px 8px; border-radius: 99px; background: rgba(217,70,239,0.1); color: var(--accent-tertiary); margin-left: 5px; font-weight:600;">Recruiter</span>
    </div>

    <div class="tabs-container">
      <div class="tabs-list">
        <button class="tabs-trigger active" onclick="switchTab('login')">Log In</button>
        <button class="tabs-trigger" onclick="switchTab('signup')">Sign Up</button>
        <div class="tabs-indicator" id="tabsIndicator"></div>
      </div>

      <div class="glass-panel animate-card">
        <div class="tabs-contents">

          <!-- Login Form -->
          <div id="loginForm" class="tabs-content active">
            <form onsubmit="handleAuth(event, 'login')">
              <div class="card-header">
                <div class="card-title">Employer Log In</div>
                <div class="card-description">
                  Sign in to post jobs, review applicants, and access verified hiring metrics.
                </div>
              </div>
              <div class="card-content">
                <div class="form-group">
                  <label class="form-label" for="loginEmail">Work Email Address</label>
                  <input type="email" id="loginEmail" class="form-control" placeholder="hr@company.com"
                    value="recruiter@jobsarthi.ai">
                </div>
                <div class="form-group">
                  <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label class="form-label" for="loginPassword">Password</label>
                    <a href="#" style="font-size: 0.8rem; color: var(--accent-tertiary);">Forgot Password?</a>
                  </div>
                  <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" value="password123">
                </div>
              </div>
              <div class="card-footer">
                <button type="submit" class="btn btn-primary"
                  style="width: 100%; background: linear-gradient(135deg, var(--accent-tertiary) 0%, #a21caf 100%); box-shadow: 0 4px 15px rgba(217,70,239,0.3);">Sign In as Recruiter</button>
              </div>
            </form>
          </div>

          <!-- Sign Up Form -->
          <div id="signupForm" class="tabs-content">
            <form onsubmit="handleAuth(event, 'signup')">
              <div class="card-header">
                <div class="card-title">Create Business Account</div>
                <div class="card-description">
                  Get instant access to JobSarthi's AI assessment pipelines and verified applicant networks.
                </div>
              </div>
              <div class="card-content">
                <div class="form-group">
                  <label class="form-label" for="companyName">Company Name</label>
                  <input type="text" id="companyName" class="form-control" placeholder="Acme Corporation">
                </div>
                <div class="form-group">
                  <label class="form-label" for="signupEmail">Work Email Address</label>
                  <input type="email" id="signupEmail" class="form-control" placeholder="name@company.com">
                </div>
                <div class="form-group">
                  <label class="form-label" for="signupPassword">Password</label>
                  <input type="password" id="signupPassword" class="form-control" placeholder="Minimum 8 characters">
                </div>
              </div>
              <div class="card-footer">
                <button type="submit" class="btn btn-primary"
                  style="width: 100%; background: linear-gradient(135deg, var(--accent-tertiary) 0%, #a21caf 100%); box-shadow: 0 4px 15px rgba(217,70,239,0.3);">Create Recruiter Account</button>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      const triggers = document.querySelectorAll('.tabs-trigger');
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const indicator = document.getElementById('tabsIndicator');

      triggers.forEach(t => t.classList.remove('active'));

      if (tab === 'login') {
        triggers[0].classList.add('active');
        indicator.style.transform = 'translateX(0)';
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
      } else {
        triggers[1].classList.add('active');
        indicator.style.transform = 'translateX(100%)';
        signupForm.classList.add('active');
        loginForm.classList.remove('active');
      }
    }

    const getApiBaseUrl = () => {
      if (window.location.hostname.includes('vercel') || window.location.protocol === 'file:') {
        return 'https://jobsarthi-backend.onrender.com';
      }
      return '';
    };
    const API_BASE_URL = getApiBaseUrl();

    async function handleAuth(event, type) {
      event.preventDefault();

      const submitBtn = event.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Connecting...';

      // Cold start warning indicator
      const warningTimer = setTimeout(() => {
        submitBtn.textContent = 'Waking up server (takes up to 30s)...';
      }, 3500);

      let body = {};
      let endpoint = '';

      if (type === 'signup') {
        const companyName = document.getElementById('companyName').value || "InnovateTech";
        const email = document.getElementById('signupEmail').value || "recruiter_" + Date.now() + "@jobsarthi.ai";
        const password = document.getElementById('signupPassword').value || "password123";

        body = { fullName: companyName + " HR", email, password, role: 'recruiter', company: companyName };
        endpoint = API_BASE_URL + '/api/auth/signup';
      } else {
        const email = document.getElementById('loginEmail').value || "recruiter@jobsarthi.ai";
        const password = document.getElementById('loginPassword').value || "password123";

        body = { email, password };
        endpoint = API_BASE_URL + '/api/auth/login';
      }

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const result = await response.json();
        clearTimeout(warningTimer);

        if (!response.ok) {
          alert(result.error || 'Authentication failed. Please check your credentials.');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          return;
        }

        // Store user info in localStorage for frontend compatibility
        localStorage.setItem('recruiter_logged_in', 'true');
        localStorage.setItem('recruiter_company', result.user.company || 'InnovateTech');
        localStorage.setItem('recruiter_email', result.user.email);

        // Redirect to recruiter home dashboard
        window.location.href = 'index.html';
      } catch (err) {
        clearTimeout(warningTimer);
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
        console.warn('Backend server offline. Falling back to local simulation for UI testing:', err);
        localStorage.setItem('recruiter_logged_in', 'true');
        localStorage.setItem('recruiter_company', body.company || "InnovateTech");
        localStorage.setItem('recruiter_email', body.email || "recruiter@jobsarthi.ai");
        window.location.href = 'index.html';
      }
    }

    // Liquid glass spotlight coordinates tracking
    document.addEventListener('mousemove', (e) => {
      const cards = document.querySelectorAll('.glass-panel, .glass-card, .portal-side, .deck-card, .info-card, .team-card, .profile-sidebar, .welcome-card');
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
      });
    });
  </script>

</body>

</html>
