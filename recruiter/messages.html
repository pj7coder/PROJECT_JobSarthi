<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - JobSarthi Recruiter</title>
  <meta name="description" content="Communicate directly with candidates and schedule interviews.">
  <link rel="stylesheet" href="../css/main.css">
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('light-theme');
      });
    }
  </script>
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      height: calc(100vh - 120px);
      margin-top: 20px;
    }

    @media (max-width: 800px) {
      .chat-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      .chat-sidebar {
        display: none;
      }
    }

    /* Chats List Sidebar */
    .chat-sidebar {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .candidate-chat-item {
      padding: 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      border: 1px solid transparent;
      transition: var(--transition-fast);
    }

    .candidate-chat-item:hover, .candidate-chat-item.active {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--glass-border);
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
    }

    .chat-meta {
      overflow: hidden;
    }

    .chat-meta h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 2px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .chat-meta p {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    /* Main chat pane */
    .chat-main {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .chat-header-pane {
      padding: 20px 30px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-body-messages {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Bubbles */
    .chat-bubble {
      display: flex;
      gap: 12px;
      max-width: 75%;
      animation: msgAppear 0.25s ease-out;
    }

    @keyframes msgAppear {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble-employer {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .bubble-text {
      padding: 14px 18px;
      border-radius: var(--radius-lg);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .text-candidate {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-top-left-radius: 4px;
      color: var(--text-main);
    }

    .text-employer {
      background: var(--accent-tertiary);
      border-top-right-radius: 4px;
      color: #fff;
    }

    /* Message Send Footer */
    .chat-footer-input {
      padding: 20px 30px;
      border-top: 1px solid var(--glass-border);
      background: rgba(10, 11, 16, 0.4);
    }

    .chat-send-form {
      display: flex;
      gap: 12px;
    }

    /* Typing Dots */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 8px 12px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1" style="background: radial-gradient(circle, rgba(217, 70, 239, 0.1) 0%, rgba(0,0,0,0) 70%);"></div>
  <div class="bg-glow-2"></div>

  <!-- Recruiter Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container" style="padding-bottom: 20px;">
    <div class="chat-layout">
      <!-- Left sidebar list of chats -->
      <aside class="glass-panel chat-sidebar">
        <h2 style="font-size: 1.1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 10px;">Candidates Inbox</h2>
        
        <div class="candidate-chat-item active" onclick="switchActiveChat(1, 'Arjun Mehta')">
          <div class="chat-avatar">AM</div>
          <div class="chat-meta">
            <h3>Arjun Mehta</h3>
            <p id="preview_1">Sure, tomorrow at 3 PM works perfectly for me.</p>
          </div>
        </div>

        <div class="candidate-chat-item" onclick="switchActiveChat(2, 'Priya Sharma')">
          <div class="chat-avatar" style="background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));">PS</div>
          <div class="chat-meta">
            <h3>Priya Sharma</h3>
            <p id="preview_2">Here is the link to my Figma layouts portfolio.</p>
          </div>
        </div>

        <div class="candidate-chat-item" onclick="switchActiveChat(3, 'Kabir Dev')">
          <div class="chat-avatar">KD</div>
          <div class="chat-meta">
            <h3>Kabir Dev</h3>
            <p id="preview_3">Let me double check the database parameters.</p>
          </div>
        </div>
      </aside>

      <!-- Chat Pane -->
      <section class="glass-panel chat-main">
        <!-- Chat Panel Header -->
        <div class="chat-header-pane">
          <div>
            <h2 id="activeChatName" style="font-size: 1.2rem;">Arjun Mehta</h2>
            <span style="font-size: 0.8rem; color: var(--success); font-weight: 600;">● Active candidate</span>
          </div>
          <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;" onclick="sendScheduleInvite()">Schedule Call</button>
        </div>

        <!-- Chat messages view -->
        <div class="chat-body-messages" id="chatBodyContainer">
          <!-- Populated via Javascript -->
        </div>

        <!-- Form Input -->
        <div class="chat-footer-input">
          <form class="chat-send-form" onsubmit="handleSendMessage(event)">
            <input type="text" id="messageInput" class="form-control" placeholder="Type a message to candidate..." style="flex: 1;" autocomplete="off">
            <button type="submit" class="btn btn-primary" style="background: linear-gradient(135deg, var(--accent-tertiary) 0%, #a21caf 100%);">Send</button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script>
    let activeChatId = 1;
    let activeName = "Arjun Mehta";

    // Conversations Mock Data
    const conversations = {
      1: [
        { sender: 'candidate', text: "Hello! Thank you for reviewing my profile details. I'm excited about the Frontend Developer opening.", time: "10:30 AM" },
        { sender: 'employer', text: "Hi Arjun, your React and CSS scores look fantastic. We'd love to schedule a quick introduction call.", time: "11:15 AM" },
        { sender: 'candidate', text: "Sure, tomorrow at 3 PM works perfectly for me.", time: "11:18 AM" }
      ],
      2: [
        { sender: 'candidate', text: "Hello there, I noticed you were looking for layout designers.", time: "Yesterday" },
        { sender: 'employer', text: "Hi Priya, yes we are searching for UI/UX prototypers. Could you share some wireframe assets?", time: "Yesterday" },
        { sender: 'candidate', text: "Here is the link to my Figma layouts portfolio.", time: "Yesterday" }
      ],
      3: [
        { sender: 'employer', text: "Hi Kabir, how experienced are you with PostgreSQL database indexing?", time: "2 days ago" },
        { sender: 'candidate', text: "Let me double check the database parameters.", time: "2 days ago" }
      ]
    };

    // Candidates Response Presets
    const candidateResponses = {
      1: [
        "Thanks! I will review the invite details and click accept.",
        "Could you clarify if the role requires familiarity with Next.js?",
        "Sounds good! Let's sync tomorrow. Thank you!"
      ],
      2: [
        "I can also share some mobile wireframes if you'd like.",
        "Great! Let me know if you need anything else.",
        "Perfect, thank you for your time."
      ],
      3: [
        "I've worked with indices, partitioning, and vacuum processes.",
        "Sure, I will send over my references.",
        "Understood, thank you."
      ]
    };

    document.addEventListener("DOMContentLoaded", () => {
      renderChat();
    });

    function switchActiveChat(id, name) {
      document.querySelectorAll('.candidate-chat-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');

      activeChatId = id;
      activeName = name;
      document.getElementById('activeChatName').textContent = name;

      renderChat();
    }

    function renderChat() {
      const container = document.getElementById('chatBodyContainer');
      container.innerHTML = '';

      const messages = conversations[activeChatId] || [];

      messages.forEach(m => {
        const bubble = document.createElement('div');
        bubble.className = `chat-bubble ${m.sender === 'employer' ? 'bubble-employer' : ''}`;

        const initials = m.sender === 'employer' ? 'E' : activeName.split(' ').map(n=>n[0]).join('');
        const textClass = m.sender === 'employer' ? 'text-employer' : 'text-candidate';
        const avatarColorStyle = m.sender === 'employer' ? 'background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));' : '';

        bubble.innerHTML = `
          <div class="chat-avatar" style="${avatarColorStyle}">${initials}</div>
          <div class="bubble-text ${textClass}">${m.text}</div>
        `;

        container.appendChild(bubble);
      });

      container.scrollTop = container.scrollHeight;
    }

    function handleSendMessage(event) {
      event.preventDefault();

      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;

      // Save and render employer message
      conversations[activeChatId].push({
        sender: 'employer',
        text: text,
        time: "Just now"
      });

      // Update sidebar preview
      document.getElementById(`preview_${activeChatId}`).textContent = text;

      renderChat();
      input.value = '';

      // Trigger candidate typing auto-response
      const typingId = showTypingIndicator();

      setTimeout(() => {
        removeTypingIndicator(typingId);

        // Get response preset
        const presets = candidateResponses[activeChatId];
        const reply = presets.shift() || "Thank you! I will get back to you shortly.";

        conversations[activeChatId].push({
          sender: 'candidate',
          text: reply,
          time: "Just now"
        });

        // Update sidebar preview
        document.getElementById(`preview_${activeChatId}`).textContent = reply;

        renderChat();
      }, 1500);
    }

    function sendScheduleInvite() {
      const inviteMsg = "📅 <strong>Interview Scheduled:</strong> An interview invitation has been generated for tomorrow at 3:00 PM (IST). Check your mail calendar for verification.";
      
      conversations[activeChatId].push({
        sender: 'employer',
        text: inviteMsg,
        time: "Just now"
      });

      document.getElementById(`preview_${activeChatId}`).innerHTML = "Interview scheduled slot sent.";
      renderChat();
    }

    function showTypingIndicator() {
      const container = document.getElementById('chatBodyContainer');
      const id = 'typing_' + Date.now();

      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble';
      bubble.id = id;

      const initials = activeName.split(' ').map(n=>n[0]).join('');

      bubble.innerHTML = `
        <div class="chat-avatar">${initials}</div>
        <div class="bubble-text text-candidate">
          <div class="typing-indicator">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      `;

      container.appendChild(bubble);
      container.scrollTop = container.scrollHeight;
      return id;
    }

    function removeTypingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }
  
  </script>
  
  <script src="../js/header.js"></script>


</body>
</html>
