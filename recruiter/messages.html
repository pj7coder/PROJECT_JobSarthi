<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - JobSarthi Recruiter</title>
  <meta name="description" content="Communicate directly with candidates and schedule interviews.">
  <link rel="stylesheet" href="../css/main.css">
  <script>
    if (localStorage.getItem('recruiter_logged_in') !== 'true') {
      window.location.replace('login_signup.html');
    }
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('light-theme');
      });
    }
  </script>
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      height: calc(100vh - 140px);
      margin-top: 24px;
    }

    @media (max-width: 800px) {
      .chat-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      .chat-sidebar {
        display: none;
      }
    }

    /* Chats List Sidebar */
    .chat-sidebar {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }
    
    .chat-sidebar h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.02em;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 8px;
    }

    .candidate-chat-item {
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.03);
      background: rgba(255, 255, 255, 0.01);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light-theme .candidate-chat-item {
      border: 1px solid rgba(0, 0, 0, 0.03);
      background: rgba(0, 0, 0, 0.01);
    }

    .candidate-chat-item:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    body.light-theme .candidate-chat-item:hover {
      background: rgba(0, 0, 0, 0.02);
      border-color: rgba(0, 0, 0, 0.06);
    }

    .candidate-chat-item.active {
      background: rgba(162, 28, 175, 0.08);
      border-color: rgba(162, 28, 175, 0.3);
      box-shadow: 0 4px 20px rgba(162, 28, 175, 0.05);
    }

    body.light-theme .candidate-chat-item.active {
      background: rgba(162, 28, 175, 0.05);
      border-color: rgba(162, 28, 175, 0.2);
    }

    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      box-shadow: 0 4px 12px rgba(162, 28, 175, 0.2);
      overflow: hidden;
      flex-shrink: 0;
    }

    .chat-meta {
      overflow: hidden;
    }

    .chat-meta h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-main);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .chat-meta p {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    /* Main chat pane */
    .chat-main {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .chat-header-pane {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(24, 24, 27, 0.2);
      backdrop-filter: blur(10px);
    }

    body.light-theme .chat-header-pane {
      background: rgba(255, 255, 255, 0.2);
    }

    .chat-body-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: rgba(10, 11, 16, 0.1);
    }

    /* Bubbles */
    .chat-bubble {
      display: flex;
      gap: 12px;
      max-width: 70%;
      align-items: flex-end;
      animation: msgAppear 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgAppear {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .bubble-employer {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .bubble-text {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.45;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .text-candidate {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
      color: var(--text-main);
    }

    body.light-theme .text-candidate {
      background: rgba(0, 0, 0, 0.02);
    }

    .text-employer {
      background: linear-gradient(135deg, var(--accent-tertiary), #a21caf);
      border-bottom-right-radius: 4px;
      color: #fff;
      box-shadow: 0 4px 12px rgba(162, 28, 175, 0.15);
    }

    /* Message Send Footer */
    .chat-footer-input {
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
      background: rgba(24, 24, 27, 0.4);
      backdrop-filter: blur(10px);
    }

    body.light-theme .chat-footer-input {
      background: rgba(255, 255, 255, 0.4);
    }

    .chat-send-form {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* Custom Scrollbar for premium feel */
    .chat-sidebar::-webkit-scrollbar,
    .chat-body-messages::-webkit-scrollbar {
      width: 6px;
    }
    .chat-sidebar::-webkit-scrollbar-thumb,
    .chat-body-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    body.light-theme .chat-sidebar::-webkit-scrollbar-thumb,
    body.light-theme .chat-body-messages::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.05);
    }

    /* Typing Dots */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 8px 12px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1" style="background: radial-gradient(circle, rgba(217, 70, 239, 0.1) 0%, rgba(0,0,0,0) 70%);"></div>
  <div class="bg-glow-2"></div>

  <!-- Recruiter Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container" style="padding-bottom: 20px;">
    <div class="chat-layout">
      <!-- Left sidebar list of chats -->
      <aside class="glass-panel chat-sidebar">
        <h2 style="font-size: 1.1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 10px;">Candidates Inbox</h2>
        
        <div class="candidate-chat-item active" onclick="switchActiveChat(1, 'Arjun Mehta')">
          <div class="chat-avatar">AM</div>
          <div class="chat-meta">
            <h3>Arjun Mehta</h3>
            <p id="preview_1">Sure, tomorrow at 3 PM works perfectly for me.</p>
          </div>
        </div>

        <div class="candidate-chat-item" onclick="switchActiveChat(2, 'Priya Sharma')">
          <div class="chat-avatar" style="background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));">PS</div>
          <div class="chat-meta">
            <h3>Priya Sharma</h3>
            <p id="preview_2">Here is the link to my Figma layouts portfolio.</p>
          </div>
        </div>

        <div class="candidate-chat-item" onclick="switchActiveChat(3, 'Kabir Dev')">
          <div class="chat-avatar">KD</div>
          <div class="chat-meta">
            <h3>Kabir Dev</h3>
            <p id="preview_3">Let me double check the database parameters.</p>
          </div>
        </div>
      </aside>

      <!-- Chat Pane -->
      <section class="glass-panel chat-main">
        <!-- Chat Panel Header -->
        <div class="chat-header-pane">
          <div>
            <h2 id="activeChatName" style="font-size: 1.2rem;">Arjun Mehta</h2>
            <span style="font-size: 0.8rem; color: var(--success); font-weight: 600;">● Active candidate</span>
          </div>
          <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;" onclick="sendScheduleInvite()">Schedule Call</button>
        </div>

        <!-- Chat messages view -->
        <div class="chat-body-messages" id="chatBodyContainer">
          <!-- Populated via Javascript -->
        </div>

        <!-- Form Input -->
        <div class="chat-footer-input">
          <form class="chat-send-form" onsubmit="handleSendMessage(event)">
            <input type="text" id="messageInput" class="form-control" placeholder="Type a message to candidate..." style="flex: 1;" autocomplete="off">
            <button type="submit" class="btn btn-primary" style="background: linear-gradient(135deg, var(--accent-tertiary) 0%, #a21caf 100%);">Send</button>
          </form>
        </div>
      </section>
    </div>
  </main>  <script>
    let messages = [];
    let conversations = {}; // grouped by seekerEmail
    let activeChatEmail = null;
    const recruiterEmail = localStorage.getItem('recruiter_email');
    const recruiterCompany = localStorage.getItem('recruiter_company') || 'Company';

    document.addEventListener("DOMContentLoaded", () => {
      if (!recruiterEmail) {
        window.location.replace('login_signup.html');
        return;
      }
      loadMessages();
      // Poll for messages
      setInterval(loadMessages, 3000);
    });

    async function loadMessages() {
      try {
        const response = await fetch(`/api/messages?email=${encodeURIComponent(recruiterEmail)}&role=recruiter`);
        if (!response.ok) return;
        const data = await response.json();
        messages = data;
        
        // Group messages by seeker email
        const groups = {};
        messages.forEach(msg => {
          const key = msg.seekerEmail.toLowerCase();
          if (!groups[key]) {
            groups[key] = {
              seekerEmail: msg.seekerEmail,
              seekerName: msg.seekerName,
              messages: []
            };
          }
          groups[key].messages.push(msg);
        });

        // Sort messages in each group by timestamp ascending
        for (const key in groups) {
          groups[key].messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }

        conversations = groups;
        
        // Set default active chat if none set
        const keys = Object.keys(conversations);
        if (keys.length > 0 && !activeChatEmail) {
          activeChatEmail = keys[0];
        }

        renderSidebar();
        renderChatWindow();
      } catch (err) {
        console.error("Failed to load messages:", err);
      }
    }

    function renderSidebar() {
      const sidebar = document.querySelector('.chat-sidebar');
      if (!sidebar) return;
      
      // Preserve the header title in sidebar
      sidebar.innerHTML = '<h2 style="font-size: 1.1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 10px;">Candidates Inbox</h2>';

      const keys = Object.keys(conversations);
      if (keys.length === 0) {
        const div = document.createElement('div');
        div.style.cssText = 'padding: 20px; color: var(--text-muted); text-align: center; font-size: 0.85rem;';
        div.textContent = 'No messages received yet.';
        sidebar.appendChild(div);
        return;
      }

      keys.forEach(email => {
        const conv = conversations[email];
        const lastMsgObj = conv.messages[conv.messages.length - 1];
        const lastMsgText = lastMsgObj ? lastMsgObj.text : "No messages yet";
        const isActive = email === activeChatEmail;
        const initials = conv.seekerName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);

        const avatarHtml = lastMsgObj && lastMsgObj.seekerAvatarUrl 
          ? `<img src="${lastMsgObj.seekerAvatarUrl}" alt="${conv.seekerName}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />`
          : initials;

        const item = document.createElement('div');
        item.className = `candidate-chat-item ${isActive ? 'active' : ''}`;
        item.onclick = () => {
          activeChatEmail = email;
          renderSidebar();
          renderChatWindow();
        };

        const companyBadge = lastMsgObj && lastMsgObj.companyName 
          ? `<span style="font-size: 0.72rem; font-weight: normal; opacity: 0.75; background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; color: var(--accent-secondary); border: 1px solid var(--border-subtle);">${lastMsgObj.companyName}</span>`
          : '';

        item.innerHTML = `
          <div class="chat-avatar">${avatarHtml}</div>
          <div class="chat-meta">
            <h3 style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <span>${conv.seekerName}</span>
              ${companyBadge}
            </h3>
            <p>${lastMsgText}</p>
          </div>
        `;
        sidebar.appendChild(item);
      });
    }

    function renderChatWindow() {
      const activeChatName = document.getElementById('activeChatName');
      const container = document.getElementById('chatBodyContainer');
      if (!activeChatName || !container) return;

      if (!activeChatEmail || !conversations[activeChatEmail]) {
        activeChatName.textContent = "Select a Candidate";
        container.innerHTML = `
          <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.95rem;">
            Select a candidate from the sidebar to view messages.
          </div>
        `;
        return;
      }

      const conv = conversations[activeChatEmail];
      const lastMsgObj = conv.messages[0];
      const activeCompanyText = lastMsgObj && lastMsgObj.companyName ? ` (${lastMsgObj.companyName})` : '';
      activeChatName.textContent = conv.seekerName + activeCompanyText;

      // Check if scroll was at the bottom
      const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;

      container.innerHTML = '';
      conv.messages.forEach(m => {
        const bubble = document.createElement('div');
        const isEmployer = m.sender === 'recruiter';
        bubble.className = `chat-bubble ${isEmployer ? 'bubble-employer' : ''}`;

        const initials = isEmployer ? 'HR' : conv.seekerName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        const textClass = isEmployer ? 'text-employer' : 'text-candidate';
        const avatarColorStyle = isEmployer ? 'background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));' : '';
        const avatarHtml = isEmployer 
          ? initials 
          : (m.seekerAvatarUrl 
              ? `<img src="${m.seekerAvatarUrl}" alt="${conv.seekerName}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />`
              : initials);

        bubble.innerHTML = `
          <div class="chat-avatar" style="${avatarColorStyle}">${avatarHtml}</div>
          <div class="bubble-text ${textClass}">${m.text}</div>
        `;

        container.appendChild(bubble);
      });

      if (isAtBottom || container.scrollTop === 0) {
        container.scrollTop = container.scrollHeight;
      }
    }

    async function handleSendMessage(event) {
      if (event) event.preventDefault();

      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !activeChatEmail || !conversations[activeChatEmail]) return;

      const conv = conversations[activeChatEmail];
      const lastMsgObj = conv.messages[0];
      const finalCompany = lastMsgObj && lastMsgObj.companyName ? lastMsgObj.companyName : recruiterCompany;
      const finalRecruiterName = lastMsgObj && lastMsgObj.recruiterName ? lastMsgObj.recruiterName : (recruiterCompany + ' HR');
      
      input.value = '';

      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            seekerEmail: conv.seekerEmail,
            seekerName: conv.seekerName,
            recruiterEmail: recruiterEmail,
            recruiterName: finalRecruiterName,
            companyName: finalCompany,
            sender: 'recruiter',
            text: text
          })
        });

        if (response.ok) {
          await loadMessages();
        } else {
          alert('Failed to send message.');
        }
      } catch (err) {
        console.error("Error sending message:", err);
      }
    }

    async function sendScheduleInvite() {
      if (!activeChatEmail || !conversations[activeChatEmail]) return;
      const conv = conversations[activeChatEmail];
      const lastMsgObj = conv.messages[0];
      const finalCompany = lastMsgObj && lastMsgObj.companyName ? lastMsgObj.companyName : recruiterCompany;
      const finalRecruiterName = lastMsgObj && lastMsgObj.recruiterName ? lastMsgObj.recruiterName : (recruiterCompany + ' HR');
      const inviteMsg = "📅 <strong>Interview Scheduled:</strong> An interview invitation has been generated for tomorrow at 3:00 PM (IST). Please check your email calendar details.";
      
      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            seekerEmail: conv.seekerEmail,
            seekerName: conv.seekerName,
            recruiterEmail: recruiterEmail,
            recruiterName: finalRecruiterName,
            companyName: finalCompany,
            sender: 'recruiter',
            text: inviteMsg
          })
        });

        if (response.ok) {
          await loadMessages();
        } else {
          alert('Failed to send schedule invite.');
        }
      } catch (err) {
        console.error("Error sending schedule invite:", err);
      }
    }
  </script>

  <script src="../js/header.js"></script>
</body>
</html>
