<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - JobSarthi Recruiter</title>
  <meta name="description" content="Communicate directly with candidates and schedule interviews.">
  <link rel="stylesheet" href="../css/main.css">
  <script>
    if (localStorage.getItem('recruiter_logged_in') !== 'true') {
      window.location.replace('login_signup.html');
    }
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme && savedTheme !== 'dark') {
      document.documentElement.classList.add(savedTheme + '-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add(savedTheme + '-theme');
      });
    }
  </script>
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      height: calc(100vh - 140px);
      margin-top: 24px;
      position: relative;
    }

    /* Chats List Sidebar */
    .chat-sidebar {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .chat-sidebar h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.02em;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 8px;
    }

    .candidate-chat-item {
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      transition: all 0.2s ease;
    }

    .candidate-chat-item:hover {
      background: var(--bg-secondary);
      border-color: var(--border-focus);
    }

    .candidate-chat-item.active {
      background: var(--bg-secondary);
      border-color: var(--accent-secondary);
    }

    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      font-weight: 700;
      font-size: 0.95rem;
      overflow: hidden;
      flex-shrink: 0;
    }

    .chat-meta {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-meta h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      margin: 0;
    }

    .chat-meta p {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      margin: 0;
    }

    /* Main chat pane */
    .chat-main {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      padding: 0;
    }

    .chat-header-pane {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-surface);
    }

    .chat-body-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg-primary);
    }

    /* Bubbles */
    .chat-bubble {
      display: flex;
      gap: 12px;
      max-width: 70%;
      align-items: flex-end;
      animation: msgAppear 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgAppear {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .bubble-employer {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .bubble-text {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .text-candidate {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
      color: var(--text-main);
    }

    .text-employer {
      background: var(--accent-primary);
      border-bottom-right-radius: 4px;
      color: var(--bg-primary);
    }

    /* Message Send Footer */
    .chat-footer-input {
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    .chat-send-form {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* Mobile Back Button */
    .mobile-back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 8px;
      margin-right: 4px;
      align-items: center;
      justify-content: center;
    }

    /* Responsive Design for Mobile Layout (Slide view) */
    @media (max-width: 900px) {
      .chat-layout {
        grid-template-columns: 1fr;
        height: calc(100vh - 120px);
      }

      .mobile-back-btn {
        display: flex;
      }

      .chat-sidebar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        background: var(--bg-primary);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
      }

      .chat-main {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        background: var(--bg-primary);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
      }

      .chat-layout.view-sidebar .chat-sidebar {
        transform: translateX(0);
        pointer-events: auto;
        opacity: 1;
      }

      .chat-layout.view-sidebar .chat-main {
        transform: translateX(100%);
        pointer-events: none;
        opacity: 0;
      }

      .chat-layout.view-chat .chat-sidebar {
        transform: translateX(-100%);
        pointer-events: none;
        opacity: 0;
      }

      .chat-layout.view-chat .chat-main {
        transform: translateX(0);
        pointer-events: auto;
        opacity: 1;
      }
    }

    /* Custom Scrollbars */
    .chat-sidebar::-webkit-scrollbar,
    .chat-body-messages::-webkit-scrollbar {
      width: 6px;
    }
    .chat-sidebar::-webkit-scrollbar-thumb,
    .chat-body-messages::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Recruiter Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container">
    <div class="chat-layout view-sidebar" id="layoutContainer">
      <!-- Left sidebar list of chats -->
      <aside class="glass-panel chat-sidebar">
        <h2>Candidates Inbox</h2>
        <div id="sidebarList" style="display: flex; flex-direction: column; gap: 10px;">
          <!-- Dynamically populated -->
        </div>
      </aside>

      <!-- Chat Pane -->
      <section class="glass-panel chat-main">
        <!-- Chat Panel Header -->
        <div class="chat-header-pane">
          <div style="display: flex; align-items: center;">
            <button class="mobile-back-btn" onclick="showSidebarOnMobile()" title="Back to Inbox">←</button>
            <div style="display: flex; flex-direction: column;">
              <h2 id="activeChatName" style="font-size: 1.2rem; margin: 0;">Select a Candidate</h2>
              <span id="activeChatSub" style="display: none;"></span>
            </div>
          </div>
          <button class="btn btn-secondary" id="scheduleBtn" style="padding: 8px 16px; font-size: 0.85rem;" onclick="openScheduleModal()" disabled>Schedule Interview</button>
        </div>

        <!-- Chat messages view -->
        <div class="chat-body-messages" id="chatBodyContainer">
          <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.95rem;">
            Select a candidate from the sidebar to view messages.
          </div>
        </div>

        <!-- Form Input -->
        <div class="chat-footer-input">
          <form class="chat-send-form" onsubmit="handleSendMessage(event)">
            <input type="text" id="messageInput" class="form-control" placeholder="Type a message to candidate..." style="flex: 1;" autocomplete="off" disabled>
            <button type="submit" id="sendBtn" class="btn btn-primary" disabled>Send</button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <!-- Schedule Interview Modal -->
  <div class="drawer-overlay" id="scheduleModal" style="display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.75); z-index: 100000; padding: 20px;">
    <div class="glass-panel" style="width: 400px; max-width: 100%; padding: 28px; display: flex; flex-direction: column; gap: 20px; box-shadow: none !important; background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 12px;">
      <h3 style="font-size: 1.2rem; font-weight: 700; color: var(--text-main); margin: 0;">Schedule Interview</h3>
      
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Select Date</label>
        <input type="date" id="interviewDate" class="form-control" style="width: 100%; background: var(--bg-primary); color: var(--text-main); border: 1px solid var(--border-subtle); padding: 8px 12px; border-radius: 6px;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 6px;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Select Time</label>
        <input type="time" id="interviewTime" class="form-control" style="width: 100%; background: var(--bg-primary); color: var(--text-main); border: 1px solid var(--border-subtle); padding: 8px 12px; border-radius: 6px;">
      </div>

      <div style="display: flex; gap: 12px; margin-top: 8px;">
        <button class="btn btn-secondary" style="flex: 1; padding: 10px; border-radius: 6px;" onclick="closeScheduleModal()">Cancel</button>
        <button class="btn btn-primary" style="flex: 1; padding: 10px; border-radius: 6px; background: var(--accent-primary); color: var(--bg-primary);" onclick="confirmScheduleInterview()">Schedule</button>
      </div>
    </div>
  </div>

  <script src="../js/header.js"></script>
  <script>
    let messages = [];
    let conversations = {}; // grouped by seekerEmail
    let activeChatEmail = null;
    let renderedConversationsJSON = "";
    let renderedMessageCount = 0;
    let lastActiveChatEmail = null;

    const recruiterEmail = localStorage.getItem('recruiter_email');
    const recruiterCompany = localStorage.getItem('recruiter_company') || 'Company';

    document.addEventListener("DOMContentLoaded", () => {
      if (!recruiterEmail) {
        window.location.replace('login_signup.html');
        return;
      }
      loadMessages();
      // Poll for messages every 3 seconds
      setInterval(loadMessages, 3000);
    });

    async function loadMessages() {
      try {
        const response = await fetch(`/api/messages?email=${encodeURIComponent(recruiterEmail)}&role=recruiter`);
        if (!response.ok) return;
        const data = await response.json();
        messages = data;
        
        // Group messages by seeker email
        const groups = {};
        messages.forEach(msg => {
          const key = msg.seekerEmail.toLowerCase();
          if (!groups[key]) {
            groups[key] = {
              seekerEmail: msg.seekerEmail,
              seekerName: msg.seekerName,
              messages: []
            };
          }
          groups[key].messages.push(msg);
        });

        // Sort messages in each group by timestamp ascending
        for (const key in groups) {
          groups[key].messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }

        conversations = groups;
        
        // Set default active chat if none set
        const keys = Object.keys(conversations);
        if (keys.length > 0 && !activeChatEmail) {
          activeChatEmail = keys[0];
        }

        // Check change detection for sidebar
        const currentConvsJSON = JSON.stringify(keys.map(email => ({
          email,
          seekerName: conversations[email].seekerName,
          lastMsgText: conversations[email].messages[conversations[email].messages.length - 1]?.text,
          active: email === activeChatEmail
        })));

        if (currentConvsJSON !== renderedConversationsJSON) {
          renderedConversationsJSON = currentConvsJSON;
          renderSidebar();
        }

        // Check change detection for chat window
        const activeConv = conversations[activeChatEmail];
        const activeMsgCount = activeConv ? activeConv.messages.length : 0;

        if (activeChatEmail !== lastActiveChatEmail || activeMsgCount !== renderedMessageCount) {
          const isChatSwitched = activeChatEmail !== lastActiveChatEmail;
          lastActiveChatEmail = activeChatEmail;
          renderedMessageCount = activeMsgCount;
          renderChatWindow(isChatSwitched);
        }
      } catch (err) {
        console.error("Failed to load messages:", err);
      }
    }

    function renderSidebar() {
      const sidebarContainer = document.getElementById('sidebarList');
      if (!sidebarContainer) return;
      sidebarContainer.innerHTML = '';

      const keys = Object.keys(conversations);
      if (keys.length === 0) {
        sidebarContainer.innerHTML = '<div style="padding: 20px; color: var(--text-muted); text-align: center; font-size: 0.85rem;">No messages received yet.</div>';
        return;
      }

      keys.forEach(email => {
        const conv = conversations[email];
        const lastMsgObj = conv.messages[conv.messages.length - 1];
        const lastMsgText = lastMsgObj ? lastMsgObj.text : "No messages yet";
        const isActive = email === activeChatEmail;
        const initials = conv.seekerName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);

        const avatarHtml = lastMsgObj && lastMsgObj.seekerAvatarUrl 
          ? `<img src="${lastMsgObj.seekerAvatarUrl}" alt="${conv.seekerName}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />`
          : initials;

        const item = document.createElement('div');
        item.className = `candidate-chat-item ${isActive ? 'active' : ''}`;
        item.onclick = () => {
          activeChatEmail = email;
          
          // Switch to chat view on mobile
          const layout = document.getElementById('layoutContainer');
          if (layout) {
            layout.classList.remove('view-sidebar');
            layout.classList.add('view-chat');
          }
          
          loadMessages();
        };

        item.innerHTML = `
          <div class="chat-avatar">${avatarHtml}</div>
          <div class="chat-meta">
            <h3 style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <span>${conv.seekerName}</span>
            </h3>
            <p>${lastMsgText}</p>
          </div>
        `;
        sidebarContainer.appendChild(item);
      });
    }

    function renderChatWindow(isChatSwitched) {
      const activeChatName = document.getElementById('activeChatName');
      const activeChatSub = document.getElementById('activeChatSub');
      const container = document.getElementById('chatBodyContainer');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const scheduleBtn = document.getElementById('scheduleBtn');
      
      if (!activeChatName || !container || !messageInput || !sendBtn || !scheduleBtn) return;

      if (!activeChatEmail || !conversations[activeChatEmail]) {
        activeChatName.textContent = "Select a Candidate";
        activeChatSub.style.display = 'none';
        container.innerHTML = `
          <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.95rem;">
            Select a candidate from the sidebar to view messages.
          </div>
        `;
        messageInput.disabled = true;
        sendBtn.disabled = true;
        scheduleBtn.disabled = true;
        return;
      }

      const conv = conversations[activeChatEmail];
      activeChatName.textContent = conv.seekerName;
      activeChatSub.style.display = 'none';

      messageInput.disabled = false;
      sendBtn.disabled = false;
      scheduleBtn.disabled = false;

      // Check scroll position before rendering updates
      const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 60;

      if (isChatSwitched) {
        container.innerHTML = '';
        conv.messages.forEach(m => {
          const bubble = document.createElement('div');
          const isEmployer = m.sender === 'recruiter';
          bubble.className = `chat-bubble ${isEmployer ? 'bubble-employer' : ''}`;

          const initials = isEmployer ? 'HR' : conv.seekerName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
          const textClass = isEmployer ? 'text-employer' : 'text-candidate';
          const avatarColorStyle = isEmployer ? 'background: var(--accent-primary); color: var(--bg-primary);' : '';
          const avatarHtml = isEmployer 
            ? initials 
            : (m.seekerAvatarUrl 
                ? `<img src="${m.seekerAvatarUrl}" alt="${conv.seekerName}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />`
                : initials);

          bubble.innerHTML = `
            <div class="chat-avatar" style="${avatarColorStyle}">${avatarHtml}</div>
            <div class="bubble-text ${textClass}">${m.text}</div>
          `;
          container.appendChild(bubble);
        });
        container.scrollTop = container.scrollHeight;
      } else {
        const currentBubbles = container.querySelectorAll('.chat-bubble');
        const renderedCount = currentBubbles.length;

        if (conv.messages.length > renderedCount) {
          const newMessages = conv.messages.slice(renderedCount);
          newMessages.forEach(m => {
            const bubble = document.createElement('div');
            const isEmployer = m.sender === 'recruiter';
            bubble.className = `chat-bubble ${isEmployer ? 'bubble-employer' : ''}`;

            const initials = isEmployer ? 'HR' : conv.seekerName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            const textClass = isEmployer ? 'text-employer' : 'text-candidate';
            const avatarColorStyle = isEmployer ? 'background: var(--accent-primary); color: var(--bg-primary);' : '';
            const avatarHtml = isEmployer 
              ? initials 
              : (m.seekerAvatarUrl 
                  ? `<img src="${m.seekerAvatarUrl}" alt="${conv.seekerName}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;" />`
                  : initials);

            bubble.innerHTML = `
              <div class="chat-avatar" style="${avatarColorStyle}">${avatarHtml}</div>
              <div class="bubble-text ${textClass}">${m.text}</div>
            `;
            container.appendChild(bubble);
          });

          const lastNewMessage = newMessages[newMessages.length - 1];
          if (isAtBottom || lastNewMessage.sender === 'recruiter') {
            container.scrollTop = container.scrollHeight;
          }
        }
      }
    }

    async function handleSendMessage(event) {
      if (event) event.preventDefault();

      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !activeChatEmail || !conversations[activeChatEmail]) return;

      const conv = conversations[activeChatEmail];
      const lastMsgObj = conv.messages[0];
      const finalCompany = lastMsgObj && lastMsgObj.companyName ? lastMsgObj.companyName : recruiterCompany;
      const finalRecruiterName = lastMsgObj && lastMsgObj.recruiterName ? lastMsgObj.recruiterName : (recruiterCompany + ' HR');
      
      input.value = '';

      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            seekerEmail: conv.seekerEmail,
            seekerName: conv.seekerName,
            recruiterEmail: recruiterEmail,
            recruiterName: finalRecruiterName,
            companyName: finalCompany,
            sender: 'recruiter',
            text: text
          })
        });

        if (response.ok) {
          await loadMessages();
        } else {
          alert('Failed to send message.');
        }
      } catch (err) {
        console.error("Error sending message:", err);
      }
    }

    function openScheduleModal() {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const yyyy = tomorrow.getFullYear();
      const mm = String(tomorrow.getMonth() + 1).padStart(2, '0');
      const dd = String(tomorrow.getDate()).padStart(2, '0');
      document.getElementById('interviewDate').value = `${yyyy}-${mm}-${dd}`;
      document.getElementById('interviewTime').value = "15:00";
      
      document.getElementById('scheduleModal').style.display = 'flex';
    }

    function closeScheduleModal() {
      document.getElementById('scheduleModal').style.display = 'none';
    }

    async function confirmScheduleInterview() {
      const dateVal = document.getElementById('interviewDate').value;
      const timeVal = document.getElementById('interviewTime').value;
      if (!dateVal || !timeVal) {
        alert("Please select both a date and a time.");
        return;
      }

      const dateObj = new Date(dateVal);
      const formattedDate = dateObj.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      const [hours, minutes] = timeVal.split(':');
      const suffix = Number(hours) >= 12 ? 'PM' : 'AM';
      const formattedHours = ((Number(hours) + 11) % 12 + 1);
      const formattedTime = `${formattedHours}:${minutes} ${suffix}`;

      if (!activeChatEmail || !conversations[activeChatEmail]) return;
      const conv = conversations[activeChatEmail];
      const lastMsgObj = conv.messages[0];
      const finalCompany = lastMsgObj && lastMsgObj.companyName ? lastMsgObj.companyName : recruiterCompany;
      const finalRecruiterName = lastMsgObj && lastMsgObj.recruiterName ? lastMsgObj.recruiterName : (recruiterCompany + ' HR');
      
      const inviteMsg = `📅 <strong>Interview Scheduled:</strong> An interview invitation has been generated for ${formattedDate} at ${formattedTime} (IST). Please check your email calendar details.`;

      closeScheduleModal();

      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            seekerEmail: conv.seekerEmail,
            seekerName: conv.seekerName,
            recruiterEmail: recruiterEmail,
            recruiterName: finalRecruiterName,
            companyName: finalCompany,
            sender: 'recruiter',
            text: inviteMsg
          })
        });

        if (response.ok) {
          await loadMessages();
        } else {
          alert('Failed to send schedule invite.');
        }
      } catch (err) {
        console.error("Error sending schedule invite:", err);
      }
    }

    function showSidebarOnMobile() {
      const layout = document.getElementById('layoutContainer');
      if (layout) {
        layout.classList.remove('view-chat');
        layout.classList.add('view-sidebar');
      }
    }
  </script>
</body>

</html>
