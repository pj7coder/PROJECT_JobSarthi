<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - JobSarthi Seeker</title>
  <meta name="description" content="Track your applications, matching indexes, and profile visibility.">
  <link rel="stylesheet" href="../css/main.css">
  <script>
    if (localStorage.getItem('seeker_logged_in') !== 'true') {
      window.location.replace('login_signup.html');
    }
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme && savedTheme !== 'dark') {
      document.documentElement.classList.add(savedTheme + '-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add(savedTheme + '-theme');
      });
    }
  </script>
  <style>
    body {
      overflow: hidden; /* No scroll on page */
    }
    .main-wrapper {
      height: calc(100vh - 80px); /* Adjust for header height */
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-top: 20px;
      padding-bottom: 20px;
      overflow: hidden;
      box-sizing: border-box;
    }
    .top-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      flex-shrink: 0;
    }
    .stat-card {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .stat-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent-secondary);
    }
    .stat-subtitle {
      font-size: 0.75rem;
      color: var(--success);
      font-weight: 500;
    }
    .middle-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0; /* Important for nested flex scroll/overflow */
    }
    .chart-panel {
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
    .chart-header {
      font-size: 1rem;
      color: var(--text-main);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .chart-container {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 2px solid var(--border-subtle);
    }
    .chart-bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
      gap: 8px;
    }
    .chart-bar {
      width: 100%;
      background: var(--accent-secondary);
      border-radius: 4px 4px 0 0;
      transition: height 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .chart-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .side-panels {
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }
    .skills-panel, .status-panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .skills-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      padding-right: 4px;
    }
    /* Custom Scrollbar for small lists */
    .skills-list::-webkit-scrollbar {
      width: 4px;
    }
    .skills-list::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 4px;
    }
    .skill-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .skill-name-score {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
    }
    .skill-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
    }
    .skill-bar-fill {
      height: 100%;
      background: var(--accent-tertiary);
      border-radius: 3px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.85rem;
    }
    .status-row:last-child {
      border-bottom: none;
    }
    .status-label {
      color: var(--text-muted);
    }
    .status-count {
      font-weight: 600;
      color: var(--text-main);
    }
  </style>
</head>
<body>
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Seeker Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container main-wrapper">
    
    <div class="top-stats">
      <div class="glass-panel stat-card">
        <div class="stat-title">Applications Sent</div>
        <div class="stat-value" id="appSentVal">0</div>
        <div class="stat-subtitle">&uarr; 12% this week</div>
      </div>
      <div class="glass-panel stat-card">
        <div class="stat-title">Profile Views</div>
        <div class="stat-value" id="profileViewsVal">0</div>
        <div class="stat-subtitle">&uarr; 8% this week</div>
      </div>
      <div class="glass-panel stat-card">
        <div class="stat-title">Interviews Scheduled</div>
        <div class="stat-value" id="interviewsVal">0</div>
        <div class="stat-subtitle" style="color: var(--text-muted);">Upcoming</div>
      </div>
      <div class="glass-panel stat-card">
        <div class="stat-title">Search Appearances</div>
        <div class="stat-value" id="searchAppVal">0</div>
        <div class="stat-subtitle">&uarr; 24% this week</div>
      </div>
    </div>

    <div class="middle-section">
      <div class="glass-panel chart-panel">
        <div class="chart-header">Profile Visibility Index (30 Days)</div>
        <div class="chart-container" id="visibilityChart">
          <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 15%;"></div><span class="chart-label">W1</span></div>
          <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 25%;"></div><span class="chart-label">W2</span></div>
          <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 35%;"></div><span class="chart-label">W3</span></div>
          <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 55%;"></div><span class="chart-label">W4</span></div>
          <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 75%;"></div><span class="chart-label">Today</span></div>
        </div>
      </div>

      <div class="side-panels">
        <div class="glass-panel status-panel">
          <div class="panel-title">Application Status</div>
          <div class="status-row">
            <span class="status-label">Applied</span>
            <span class="status-count" id="statApplied">0</span>
          </div>
          <div class="status-row">
            <span class="status-label">In Review</span>
            <span class="status-count" id="statReview">0</span>
          </div>
          <div class="status-row">
            <span class="status-label">Interviewing</span>
            <span class="status-count" id="statInterview">0</span>
          </div>
          <div class="status-row">
            <span class="status-label">Rejected</span>
            <span class="status-count" id="statRejected">0</span>
          </div>
        </div>

        <div class="glass-panel skills-panel">
          <div class="panel-title">Top Skill Matches</div>
          <div class="skills-list" id="skillsAnalyticsContainer">
            <p style="font-size: 0.8rem; color: var(--text-muted);">Loading skills...</p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="../js/header.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      loadAnalyticsData();
    });

    async function loadAnalyticsData() {
      const email = localStorage.getItem('seeker_email');
      const applied = JSON.parse(localStorage.getItem('applied_jobs') || '[]');
      const appCount = applied.length;
      
      // Update top stats
      document.getElementById('appSentVal').textContent = appCount;
      document.getElementById('profileViewsVal').textContent = Math.floor(appCount * 3.5) + 42;
      document.getElementById('interviewsVal').textContent = Math.floor(appCount * 0.2);
      document.getElementById('searchAppVal').textContent = Math.floor(appCount * 8.5) + 120;

      // Update statuses
      const statuses = { Applied: 0, Reviewing: 0, Interviewing: 0, Rejected: 0 };
      applied.forEach(a => {
        if(a.status === 'Applied') statuses.Applied++;
        else if(a.status === 'Reviewing') statuses.Reviewing++;
        else if(a.status === 'Interviewing') statuses.Interviewing++;
        else if(a.status === 'Rejected') statuses.Rejected++;
        else statuses.Applied++;
      });
      document.getElementById('statApplied').textContent = statuses.Applied;
      document.getElementById('statReview').textContent = statuses.Reviewing;
      document.getElementById('statInterview').textContent = statuses.Interviewing;
      document.getElementById('statRejected').textContent = statuses.Rejected;

      let skills = [];
      if (email) {
        try {
          const res = await fetch((window.API_BASE_URL || '') + `/api/seeker/profile?email=${encodeURIComponent(email)}`);
          if (res.ok) {
            const profile = await res.json();
            skills = profile.skills || [];
          }
        } catch (e) {
          console.error("Failed to load profile for analytics:", e);
        }
      }

      // Update chart bars heights dynamically to look alive based on activity
      const bars = document.querySelectorAll('#visibilityChart .chart-bar');
      const baseHeights = [20, 35, 45, 60, 85];
      bars.forEach((bar, idx) => {
        const factor = Math.min(100, baseHeights[idx] + (appCount * 5) + (skills.length * 2));
        bar.style.setProperty('height', `${factor}%`);
      });

      // Update skill match card
      const skillsContainer = document.getElementById('skillsAnalyticsContainer');
      if (skills.length === 0) {
        skillsContainer.innerHTML = `<p style="font-size: 0.8rem; color: var(--text-muted);">No skills listed. Go to <a href="resume.html" style="color: var(--accent-secondary);">Resume page</a> to add skills.</p>`;
      } else {
        skillsContainer.innerHTML = '';
        skills.slice(0, 6).forEach((skill, idx) => {
          let charSum = 0;
          for (let i = 0; i < skill.length; i++) charSum += skill.charCodeAt(i);
          const score = 75 + (charSum % 24);

          const skillDiv = document.createElement('div');
          skillDiv.className = 'skill-row';
          skillDiv.innerHTML = `
            <div class="skill-name-score">
              <span>${skill}</span>
              <span style="font-weight:600;">${score}%</span>
            </div>
            <div class="skill-bar-bg">
              <div class="skill-bar-fill" style="width: ${score}%; background: ${idx % 2 === 0 ? 'var(--accent-primary)' : 'var(--accent-secondary)'};"></div>
            </div>
          `;
          skillsContainer.appendChild(skillDiv);
        });
      }
    }
  </script>
</body>
</html>
