<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - JobSarthi Seeker</title>
  <meta name="description" content="Track your applications, matching indexes, and profile visibility.">
  <link rel="stylesheet" href="../css/main.css">
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('light-theme');
      });
    }
  </script>
  <style>
    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 30px;
    }
    @media (max-width: 900px) {
      .analytics-grid {
        grid-template-columns: 1fr;
      }
    }
    .metric-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .metric-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent-secondary);
    }
    .chart-container {
      height: 200px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      padding-top: 20px;
      border-bottom: 2px solid var(--border-subtle);
    }
    .chart-bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
      gap: 8px;
    }
    .chart-bar {
      width: 100%;
      background: linear-gradient(0deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      border-radius: 4px 4px 0 0;
      transition: height 1s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
    }
    .chart-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Seeker Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container">
    <div style="margin-bottom: 30px;">
      <h1 style="font-size: 2.2rem; margin-bottom: 8px;">My Performance Analytics</h1>
      <p style="color: var(--text-muted); font-size: 1.05rem;">Observe how recruiters engage with your profile and assess your matching trends.</p>
    </div>

    <div class="analytics-grid">
      <!-- Metric Card 1 -->
      <div class="glass-panel metric-card">
        <h3 style="font-size: 1rem; color: var(--text-muted);">Profile Visibility Index</h3>
        <div class="metric-value" id="visibilityIndex">0</div>
        <p style="font-size: 0.85rem; color: var(--success); font-weight: 500;" id="visibilitySubtext">0% increase in the last 7 days</p>
        
        <div class="chart-container" id="visibilityChart">
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="height: 15%;"></div>
            <span class="chart-label">Mon</span>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="height: 25%;"></div>
            <span class="chart-label">Tue</span>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="height: 35%;"></div>
            <span class="chart-label">Wed</span>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="height: 45%;"></div>
            <span class="chart-label">Thu</span>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="height: 55%;"></div>
            <span class="chart-label">Fri</span>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="height: 75%;"></div>
            <span class="chart-label">Sat</span>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="height: 90%;"></div>
            <span class="chart-label">Sun</span>
          </div>
        </div>
      </div>

      <!-- Metric Card 2 -->
      <div class="glass-panel metric-card">
        <h3 style="font-size: 1rem; color: var(--text-muted);">Skill Match Frequency</h3>
        <div class="metric-value" id="matchFrequency">0%</div>
        <p style="font-size: 0.85rem; color: var(--text-muted);">Average Match Rating across all skills</p>

        <div id="skillsAnalyticsContainer" style="margin-top: auto; display: flex; flex-direction: column; gap: 12px; max-height: 160px; overflow-y: auto;">
          <p style="font-size: 0.85rem; color: var(--text-muted);">No skills added yet.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/header.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      loadAnalyticsData();
    });

    async function loadAnalyticsData() {
      const email = localStorage.getItem('seeker_email');
      const applied = JSON.parse(localStorage.getItem('applied_jobs') || '[]');
      const appCount = applied.length;

      let skills = [];
      if (email) {
        try {
          const res = await fetch((window.API_BASE_URL || '') + `/api/seeker/profile?email=${encodeURIComponent(email)}`);
          if (res.ok) {
            const profile = await res.json();
            skills = profile.skills || [];
          }
        } catch (e) {
          console.error("Failed to load profile for analytics:", e);
        }
      }

      // Calculate dynamic visibility index
      const visIndex = (appCount * 125) + (skills.length * 45) + 30;
      const visPercent = Math.min(100, Math.floor((appCount * 15) + (skills.length * 5) + 12));
      document.getElementById('visibilityIndex').textContent = visIndex;
      document.getElementById('visibilitySubtext').innerHTML = `&uarr; ${visPercent}% increase in the last 7 days`;

      // Update chart bars heights dynamically to look alive based on activity
      const bars = document.querySelectorAll('#visibilityChart .chart-bar');
      const baseHeights = [15, 30, 25, 45, 60, 80, 95];
      bars.forEach((bar, idx) => {
        const factor = Math.min(100, baseHeights[idx] + (appCount * 8) + (skills.length * 3));
        bar.style.setProperty('height', `${factor}%`);
      });

      // Update skill match card
      const skillsContainer = document.getElementById('skillsAnalyticsContainer');
      if (skills.length === 0) {
        document.getElementById('matchFrequency').textContent = "0%";
        skillsContainer.innerHTML = `<p style="font-size: 0.85rem; color: var(--text-muted);">No skills listed in profile. Go to <a href="resume.html" style="color: var(--accent-secondary); text-decoration: underline;">Resume page</a> to add skills and build your matching matrix.</p>`;
      } else {
        skillsContainer.innerHTML = '';
        let totalScore = 0;
        skills.forEach((skill, idx) => {
          // Generate a deterministic score between 75 and 98 based on the skill name
          let charSum = 0;
          for (let i = 0; i < skill.length; i++) charSum += skill.charCodeAt(i);
          const score = 75 + (charSum % 24);
          totalScore += score;

          const skillDiv = document.createElement('div');
          skillDiv.innerHTML = `
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px;">
              <span>${skill}</span>
              <span style="font-weight:600;">${score}%</span>
            </div>
            <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 9px; overflow:hidden;">
              <div style="width: ${score}%; height: 100%; background: ${idx % 2 === 0 ? 'var(--accent-primary)' : 'var(--accent-secondary)'};"></div>
            </div>
          `;
          skillsContainer.appendChild(skillDiv);
        });

        const avgScore = Math.round(totalScore / skills.length);
        document.getElementById('matchFrequency').textContent = `${avgScore}%`;
      }
    }

    // Liquid glass spotlight coordinates tracking
    document.addEventListener('mousemove', (e) => {
      const cards = document.querySelectorAll('.glass-panel, .glass-card, .portal-side, .deck-card, .info-card, .team-card, .profile-sidebar, .welcome-card');
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
      });
    });
  </script>
</body>
</html>
