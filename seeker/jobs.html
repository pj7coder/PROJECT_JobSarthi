<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Job Openings - JobSarthi Seeker</title>
  <meta name="description"
    content="Browse, filter, and apply to hundreds of tech roles fetched from top companies using Sarthi AI.">
  <link rel="stylesheet" href="../css/main.css">
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('light-theme');
      });
    }
  </script>
  <style>
    /* Premium Page Layout styling */
    .jobs-hero {
      margin-top: 40px;
      margin-bottom: 30px;
      text-align: left;
    }

    .jobs-hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .jobs-hero p {
      font-size: 1.05rem;
      color: var(--text-muted);
    }

    /* Two Column Dashboard Layout */
    .jobs-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 30px;
      margin-bottom: 60px;
    }

    @media (max-width: 1024px) {
      .jobs-layout {
        grid-template-columns: 1fr;
      }
    }

    /* Filter Sidebar */
    .filter-sidebar {
      height: fit-content;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: sticky;
      top: 90px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-group-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    /* Elegant Glassmorphic Search Area */
    .search-container {
      display: flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      padding: 10px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: none;
      margin-bottom: 24px;
    }

    body.light-theme .search-container {
      background: rgba(0, 0, 0, 0.01);
    }

    .search-input-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-control {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .search-control:focus {
      outline: none;
    }

    /* Premium Grid Cards */
    .jobs-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .job-item {
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      box-shadow: none;
    }

    body.light-theme .job-item {
      background: #ffffff;
      box-shadow: none;
    }

    @media (max-width: 768px) {
      .job-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .job-item-actions {
        width: 100%;
        justify-content: flex-start;
        gap: 8px;
      }

      .search-container {
        flex-direction: column;
        padding: 12px;
      }

      .search-control {
        padding: 12px 12px 12px 40px;
      }
    }

    .job-item:hover {
      border-color: var(--border-subtle);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: none;
      transform: none;
    }

    body.light-theme .job-item:hover {
      background: #fafafa;
      box-shadow: none;
    }

    .job-item-main {
      display: flex;
      gap: 20px;
      align-items: center;
      flex: 1;
    }

    .job-item-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .job-item-details {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .job-item-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text-main);
    }

    .job-item-company {
      font-size: 0.95rem;
      color: var(--accent-secondary);
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .source-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.25);
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .job-item-meta {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .job-item-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .job-item-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .match-pill {
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    /* Modal / Drawer Overlay and Center Popup Content (inherited from main.css) */

    @media (max-width: 600px) {
      .drawer-content {
        padding: 20px;
        max-height: 95vh;
      }
    }

    .drawer-close {
      cursor: pointer;
      color: var(--text-muted);
      align-self: flex-start;
      margin-bottom: 24px;
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .drawer-close:hover {
      color: var(--text-main);
    }

    .detail-section {
      margin-top: 30px;
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: 20px;
    }

    .detail-section:last-of-type {
      border-bottom: none;
    }

    .detail-subtitle {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-body {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .applied-alert {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 16px 24px;
      background: var(--success);
      color: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
      display: none;
      z-index: 2000;
      font-weight: 600;
      animation: fadeInUp 0.3s ease-out;
    }

    /* 3 dots wave loading animation */
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      width: 100%;
    }

    .loading-wave {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .loading-dot {
      width: 6px;
      height: 6px;
      background-color: var(--accent-secondary);
      border-radius: 50%;
      display: inline-block;
      animation: wave 1.2s infinite ease-in-out;
    }

    .loading-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes wave {
      0%, 60%, 100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-6px);
      }
    }

    /* Hamster Loader Animation */
    .wheel-and-hamster {
      --dur: 1s;
      position: relative;
      width: 12em;
      height: 12em;
      font-size: 14px;
      transform: scaleX(-1); /* Flips left-to-right */
    }

    .wheel,
    .hamster,
    .hamster div,
    .spoke {
      position: absolute;
    }

    .wheel,
    .spoke {
      border-radius: 50%;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .wheel {
      background: radial-gradient(circle at center, rgba(0,0,0,0) 40%, #5c3d24 41%, #8a5a36 43%, #a67c52 47%, #4a301c 49%);
      z-index: 2;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    }

    .hamster {
      animation: hamster var(--dur) ease-in-out infinite;
      top: 50%;
      left: calc(50% - 3.5em);
      width: 7em;
      height: 3.75em;
      transform: rotate(4deg) translate(-0.8em,1.85em);
      transform-origin: 50% 0;
      z-index: 1;
    }

    .hamster__head {
      animation: hamsterHead var(--dur) ease-in-out infinite;
      background: hsl(30,90%,55%);
      border-radius: 70% 30% 0 100% / 40% 25% 25% 60%;
      box-shadow: 0 -0.25em 0 hsl(30,90%,80%) inset,
    		0.75em -1.55em 0 hsl(30,90%,90%) inset;
      top: 0;
      left: -2em;
      width: 2.75em;
      height: 2.5em;
      transform-origin: 100% 50%;
    }

    .hamster__ear {
      animation: hamsterEar var(--dur) ease-in-out infinite;
      background: hsl(0,90%,85%);
      border-radius: 50%;
      box-shadow: -0.25em 0 hsl(30,90%,55%) inset;
      top: -0.25em;
      right: -0.25em;
      width: 0.75em;
      height: 0.75em;
      transform-origin: 50% 75%;
    }

    .hamster__eye {
      animation: hamsterEye var(--dur) linear infinite;
      background-color: hsl(0,0%,0%);
      border-radius: 50%;
      top: 0.375em;
      left: 1.25em;
      width: 0.5em;
      height: 0.5em;
    }

    .hamster__nose {
      background: hsl(0,90%,75%);
      border-radius: 35% 65% 85% 15% / 70% 50% 50% 30%;
      top: 0.75em;
      left: 0;
      width: 0.2em;
      height: 0.25em;
    }

    .hamster__body {
      animation: hamsterBody var(--dur) ease-in-out infinite;
      background: hsl(30,90%,90%);
      border-radius: 50% 30% 50% 30% / 15% 60% 40% 40%;
      box-shadow: 0.1em 0.75em 0 hsl(30,90%,55%) inset,
    		0.15em -0.5em 0 hsl(30,90%,80%) inset;
      top: 0.25em;
      left: 2em;
      width: 4.5em;
      height: 3em;
      transform-origin: 17% 50%;
      transform-style: preserve-3d;
    }

    .hamster__limb--fr,
    .hamster__limb--fl {
      clip-path: polygon(0 0,100% 0,70% 80%,60% 100%,0% 100%,40% 80%);
      top: 2em;
      left: 0.5em;
      width: 1em;
      height: 1.5em;
      transform-origin: 50% 0;
    }

    .hamster__limb--fr {
      animation: hamsterFRLimb var(--dur) linear infinite;
      background: linear-gradient(hsl(30,90%,80%) 80%,hsl(0,90%,75%) 80%);
      transform: rotate(15deg) translateZ(-1px);
    }

    .hamster__limb--fl {
      animation: hamsterFLLimb var(--dur) linear infinite;
      background: linear-gradient(hsl(30,90%,90%) 80%,hsl(0,90%,85%) 80%);
      transform: rotate(15deg);
    }

    .hamster__limb--br,
    .hamster__limb--bl {
      border-radius: 0.75em 0.75em 0 0;
      clip-path: polygon(0 0,100% 0,100% 30%,70% 90%,70% 100%,30% 100%,40% 90%,0% 30%);
      top: 1em;
      left: 2.8em;
      width: 1.5em;
      height: 2.5em;
      transform-origin: 50% 30%;
    }

    .hamster__limb--br {
      animation: hamsterBRLimb var(--dur) linear infinite;
      background: linear-gradient(hsl(30,90%,80%) 90%,hsl(0,90%,75%) 90%);
      transform: rotate(-25deg) translateZ(-1px);
    }

    .hamster__limb--bl {
      animation: hamsterBLLimb var(--dur) linear infinite;
      background: linear-gradient(hsl(30,90%,90%) 90%,hsl(0,90%,85%) 90%);
      transform: rotate(-25deg);
    }

    .hamster__tail {
      animation: hamsterTail var(--dur) linear infinite;
      background: hsl(0,90%,85%);
      border-radius: 0.25em 50% 50% 0.25em;
      box-shadow: 0 -0.2em 0 hsl(0,90%,75%) inset;
      top: 1.5em;
      right: -0.5em;
      width: 1em;
      height: 0.5em;
      transform: rotate(30deg) translateZ(-1px);
      transform-origin: 0.25em 0.25em;
    }

    .spoke {
      animation: spoke var(--dur) linear infinite;
      background: radial-gradient(circle at center, #4a301c 6.8%, rgba(0,0,0,0) 7%),
                  linear-gradient(rgba(0,0,0,0) 46.5%, #7a4f2f 47% 53%, rgba(0,0,0,0) 53.5%) 50% 50% / 99% 99% no-repeat,
                  linear-gradient(90deg, rgba(0,0,0,0) 46.5%, #7a4f2f 47% 53%, rgba(0,0,0,0) 53.5%) 50% 50% / 99% 99% no-repeat;
    }

    /* Animations */
    @keyframes hamster {
      0%, 100% {
        transform: rotate(4deg) translate(-0.8em, 1.85em);
      }
      50% {
        transform: rotate(-3deg) translate(-0.8em, 1.6em);
      }
    }

    @keyframes hamsterHead {
      0%, 50%, 100% {
        transform: rotate(0);
      }
      25%, 75% {
        transform: rotate(6deg);
      }
    }

    @keyframes hamsterEye {
      0%, 90%, 100% {
        transform: scaleY(1);
      }
      95% {
        transform: scaleY(0);
      }
    }

    @keyframes hamsterEar {
      0%, 50%, 100% {
        transform: rotate(0);
      }
      25%, 75% {
        transform: rotate(10deg);
      }
    }

    @keyframes hamsterBody {
      0%, 50%, 100% {
        transform: rotate(2deg);
      }
      25%, 75% {
        transform: rotate(-3deg);
      }
    }

    @keyframes hamsterFRLimb {
      0%, 50%, 100% {
        transform: rotate(60deg) translateZ(-1px);
      }
      25%, 75% {
        transform: rotate(-40deg) translateZ(-1px);
      }
    }

    @keyframes hamsterFLLimb {
      0%, 50%, 100% {
        transform: rotate(-40deg);
      }
      25%, 75% {
        transform: rotate(60deg);
      }
    }

    @keyframes hamsterBRLimb {
      0%, 50%, 100% {
        transform: rotate(-65deg) translateZ(-1px);
      }
      25%, 75% {
        transform: rotate(25deg) translateZ(-1px);
      }
    }

    @keyframes hamsterBLLimb {
      0%, 50%, 100% {
        transform: rotate(25deg);
      }
      25%, 75% {
        transform: rotate(-65deg);
      }
    }

    @keyframes hamsterTail {
      0%, 50%, 100% {
        transform: rotate(35deg) translateZ(-1px);
      }
      25%, 75% {
        transform: rotate(10deg) translateZ(-1px);
      }
    }

    @keyframes spoke {
      from {
        transform: rotate(0);
      }
      to {
        transform: rotate(-1turn);
      }
    }

    /* Premium Pagination Styling */
    .pagination-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .pagination-btn {
      padding: 10px 16px;
      border: 1px solid var(--border-subtle);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-main);
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    body.light-theme .pagination-btn {
      background: rgba(0, 0, 0, 0.01);
    }

    .pagination-btn:hover:not(:disabled) {
      border-color: var(--accent-secondary);
      background: rgba(6, 182, 212, 0.08);
      color: var(--accent-secondary);
      transform: translateY(-1px);
    }

    .pagination-btn.active {
      background: var(--accent-secondary);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
    }

    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Heart Bookmark Animation (Example 2) */
    .heart-container {
      --heart-color: rgb(255, 91, 137);
      position: relative;
      width: 44px;
      height: 44px;
      transition: .3s;
      cursor: pointer;
    }

    .heart-container .checkbox {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      z-index: 20;
      cursor: pointer;
      margin: 0;
    }

    .heart-container .svg-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .heart-container .svg-outline,
    .heart-container .svg-filled {
      fill: var(--heart-color);
      position: absolute;
      transition: transform 0.2s;
    }

    .heart-container .svg-outline {
      fill: none;
      stroke: var(--heart-color);
      stroke-width: 2px;
    }

    .heart-container .svg-filled {
      animation: keyframes-svg-filled 1s;
      display: none;
    }

    .heart-container .svg-celebrate {
      position: absolute;
      animation: keyframes-svg-celebrate .5s;
      animation-fill-mode: forwards;
      display: none;
      stroke: var(--heart-color);
      fill: var(--heart-color);
      stroke-width: 2px;
    }

    .heart-container .checkbox:checked~.svg-container .svg-filled {
      display: block
    }

    .heart-container .checkbox:checked~.svg-container .svg-celebrate {
      display: block
    }

    @keyframes keyframes-svg-filled {
      0% {
        transform: scale(0);
      }
      25% {
        transform: scale(1.2);
      }
      50% {
        transform: scale(1);
        filter: brightness(1.5);
      }
    }

    @keyframes keyframes-svg-celebrate {
      0% {
        transform: scale(0);
      }
      50% {
        opacity: 1;
        filter: brightness(1.5);
      }
      100% {
        transform: scale(1.4);
        opacity: 0;
        display: none;
    }

    /* Custom Switch - Example 1 */
    .custom-switch-label {
      background-color: transparent;
      border: 1px solid var(--border-subtle);
      display: inline-flex;
      align-items: center;
      border-radius: 50px;
      width: 65px;
      height: 28px;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
    }

    .custom-switch-label::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 6px;
      background-color: var(--text-muted);
      width: 14px;
      height: 14px;
      transition: all 0.4s ease;
      border-radius: 100%;
      margin: auto 0;
    }

    .custom-switch-label::after {
      content: "OFF";
      font-size: 8px;
      color: var(--text-muted);
      margin-left: 28px;
      transition: all 0.4s ease;
      font-weight: 700;
    }

    #remoteSwitch:checked + .custom-switch-label {
      background-color: var(--accent-secondary);
      border-color: var(--accent-secondary);
    }

    #remoteSwitch:checked + .custom-switch-label::before {
      background-color: #fff;
      left: calc(100% - 20px);
    }

    #remoteSwitch:checked + .custom-switch-label::after {
      content: "ON";
      color: #fff;
      margin-left: 10px;
    }

    #favouritesSwitch:checked + .custom-switch-label {
      background-color: #ff5b89;
      border-color: #ff5b89;
    }

    #favouritesSwitch:checked + .custom-switch-label::before {
      background-color: #fff;
      left: calc(100% - 20px);
    }

    #favouritesSwitch:checked + .custom-switch-label::after {
      content: "ON";
      color: #fff;
      margin-left: 10px;
    }

    /* Sliding Radio Inputs - Example 6 */
    .radio-inputs {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      border-radius: var(--radius-md);
      background-color: var(--bg-secondary);
      box-sizing: border-box;
      border: 1px solid var(--border-subtle);
      padding: 0.25rem;
      width: 280px;
      font-size: 0.8rem;
    }

    .radio-inputs .radio {
      flex: 1 1 auto;
      text-align: center;
    }

    .radio-inputs .radio input {
      display: none;
    }

    .radio-inputs .radio .name {
      display: flex;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      border: none;
      padding: 6px 0;
      color: var(--text-muted);
      transition: all .15s ease-in-out;
      font-weight: 500;
    }

    .radio-inputs .radio input:checked + .name {
      background-color: var(--accent-secondary);
      color: #fff;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <!-- Seeker Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container" style="margin-top: 30px;">
    <div class="jobs-layout">
      <!-- Left: Sidebar Filters -->
      <aside class="glass-panel filter-sidebar">
        <h2 onclick="document.querySelector('.filter-sidebar').classList.toggle('expanded')"
          style="font-size: 1.15rem; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-subtle); padding-bottom: 12px; cursor: pointer; user-select: none; -webkit-user-select: none;">
          <span style="display: flex; align-items: center; gap: 6px;">

    function getJobLocationsGroup(job) {
      const loc = (job.location || "").toLowerCase();
      if (loc.includes("remote")) {
        return ["Remote"];
      }
      
      const groups = [];
      let foundCity = false;
      for (const city of indianCities) {
        if (loc.includes(city.toLowerCase())) {
          groups.push(city);
          foundCity = true;
        }
      }
      
      let foundState = false;
      for (const state of indianStates) {
        if (loc.includes(state.toLowerCase())) {
          groups.push(state);
          foundState = true;
        }
      }
      
      if (foundCity || foundState || loc.includes("india")) {
        groups.push("India");
      } else {
        groups.push("Out of India");
      }
      return groups;
    }

    // Load seeker profile to retrieve skills for matching
    async function loadSeekerProfile() {
      const email = localStorage.getItem('seeker_email');
      if (!email) return;
      try {
        const response = await fetch((window.API_BASE_URL || '') + `/api/seeker/profile?email=${encodeURIComponent(email)}`);
        if (response.ok) {
          const profile = await response.json();
          seekerProfile = profile;
          seekerSkills = profile.skills || [];
        }
      } catch (err) {
        console.error("Error loading seeker profile for matching:", err);
      }
    }

    function extractYearsOfExperience(expStr) {
      if (!expStr) return 0;
      const match = expStr.match(/(\d+)\s*(year|yr)/i);
      if (match) return parseInt(match[1]);
      const numMatch = expStr.match(/\b(\d+)\b/);
      if (numMatch) return parseInt(numMatch[1]);
      return 0;
    }

    function getJobRequiredExperience(job) {
      const textToSearch = `${job.title} ${job.description || ''} ${(job.reqs || []).join(' ')}`.toLowerCase();
      const match = textToSearch.match(/(\d+)\s*(?:-|to|\+)?\s*(?:\d+)?\s*years?\s*(?:of\s*)?experience/i);
      if (match) {
        return parseInt(match[1]);
      }
      if (job.title.toLowerCase().includes("senior") || job.title.toLowerCase().includes("lead") || job.title.toLowerCase().includes("principal")) {
        return 5;
      }
      if (job.title.toLowerCase().includes("junior") || job.title.toLowerCase().includes("entry") || job.title.toLowerCase().includes("associate")) {
        return 1;
      }
      return 2; 
    }

    function parseSalaryLPA(salaryStr) {
      if (!salaryStr) return 0;
      const match = salaryStr.match(/(\d+)\s*(LPA|lakh)/i);
      if (match) return parseInt(match[1]);
      const numMatch = salaryStr.match(/\b(\d+)\b/);
      if (numMatch) return parseInt(numMatch[1]);
      return 0;
    }

    function getJobMatchScore(job) {
      if (!seekerProfile) {
        return 0;
      }

      let userSkills = [];
      if (Array.isArray(seekerProfile.skills)) {
        userSkills = seekerProfile.skills.map(s => s.trim().toLowerCase()).filter(Boolean);
      } else if (typeof seekerProfile.skills === 'string') {
        userSkills = seekerProfile.skills.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
      }

      let preferredLocs = [];
      if (Array.isArray(seekerProfile.preferredLocations)) {
        preferredLocs = seekerProfile.preferredLocations.map(s => s.trim().toLowerCase()).filter(Boolean);
      } else if (typeof seekerProfile.preferredLocations === 'string') {
        preferredLocs = seekerProfile.preferredLocations.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
      }
      
      const userExp = extractYearsOfExperience(seekerProfile.experience);
      const jobExp = getJobRequiredExperience(job);
      const userDegreeLower = (seekerProfile.degree || "").toLowerCase();
      const expSummaryLower = (seekerProfile.experience || "").toLowerCase();

      // STEP 1: HARD FILTERS
      if (jobExp > userExp + 4) return 0; // Exceeds experience filter

      const jobSkills = (typeof job.skills === 'string' ? job.skills : (Array.isArray(job.skills) ? job.skills.join(',') : '')).split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
      if (jobSkills.length > 0 && userSkills.length > 0) {
        const hasAnySkill = jobSkills.some(js => userSkills.includes(js) || userSkills.some(us => us.includes(js) || js.includes(us)));
        if (!hasAnySkill) return 0; 
      }

      const isJobRemote = (job.location || '').toLowerCase().includes("remote") || (job.type && job.type.toLowerCase().includes("remote"));
      const isLocationMatch = preferredLocs.length === 0 || preferredLocs.some(loc => (job.location || '').toLowerCase().includes(loc) || loc.includes((job.location || '').toLowerCase()));
      if (!isJobRemote && !isLocationMatch && preferredLocs.length > 0) {
        return 0; 
      }

      // === NORMALIZED SCORING (max 100) ===
      let location_score = 0;   // max 20
      let skill_score = 0;      // max 40
      let role_score = 0;       // max 20
      let experience_score = 0; // max 10
      let work_mode_score = 0;  // max 5
      let salary_score = 0;     // max 5

      // STEP 2: LOCATION SCORING (max 20)
      const jobLocLower = (job.location || '').toLowerCase();
      const hasCity = preferredLocs.some(loc => indianCities.some(c => c.toLowerCase() === loc) && jobLocLower.includes(loc));
      const hasState = preferredLocs.some(loc => indianStates.some(s => s.toLowerCase() === loc) && jobLocLower.includes(loc));
      const inIndia = jobLocLower.includes("india") || indianStates.some(s => jobLocLower.includes(s.toLowerCase())) || indianCities.some(c => jobLocLower.includes(c.toLowerCase()));

      if (isJobRemote) {
        location_score = 18;
      } else if (hasCity) {
        location_score = 20;
      } else if (hasState) {
        location_score = 15;
      } else if (inIndia) {
        location_score = 10;
      } else if (preferredLocs.length === 0) {
        location_score = 12;
      } else {
        location_score = 3;
      }

      // STEP 3: SKILL MATCH SCORING (max 40)
      if (jobSkills.length > 0 && userSkills.length > 0) {
        let matchCount = 0;
        jobSkills.forEach(js => {
          if (userSkills.includes(js) || userSkills.some(us => us.includes(js) || js.includes(us))) {
            matchCount++;
          }
        });
        const skillMatchRatio = matchCount / jobSkills.length;
        if (skillMatchRatio >= 0.9) skill_score = 40;
        else if (skillMatchRatio >= 0.7) skill_score = 32;
        else if (skillMatchRatio >= 0.5) skill_score = 22;
        else if (skillMatchRatio >= 0.3) skill_score = 12;
        else skill_score = 5;
      } else if (userSkills.length === 0) {
        skill_score = 15; // Profile incomplete — neutral
      } else {
        skill_score = 15; // Job has no listed skills
      }

      // STEP 4: ROLE MATCH (max 20)
      const jobTitleLower = (job.title || '').toLowerCase();
      const roleKeywords = [
        "software engineer", "developer", "machine learning", "frontend", "backend", "fullstack",
        "full stack", "designer", "data scientist", "analyst", "product manager", "devops",
        "mobile", "android", "ios", "cloud", "architect", "sre", "qa", "tester"
      ];
      
      let exactRole = false, relatedRole = false, sameDomain = false;
      
      roleKeywords.forEach(r => {
        if (jobTitleLower.includes(r)) {
          if (userDegreeLower.includes(r) || expSummaryLower.includes(r)) {
            exactRole = true;
          } else if (userSkills.some(us => r.includes(us) || us.includes(r.split(' ')[0]))) {
            relatedRole = true;
          } else {
            sameDomain = true;
          }
        }
      });
      
      if (exactRole) role_score = 20;
      else if (relatedRole) role_score = 15;
      else if (sameDomain) role_score = 8;
      else role_score = 5;

      // STEP 5: EXPERIENCE MATCH (max 10)
      const diff = userExp - jobExp;
      if (diff === 0) experience_score = 10;
      else if (Math.abs(diff) <= 1) experience_score = 8;
      else if (Math.abs(diff) <= 2) experience_score = 6;
      else if (Math.abs(diff) <= 3) experience_score = 3;
      else experience_score = 1;

      // STEP 6: WORK MODE MATCH (max 5)
      const isUserRemotePreferred = preferredLocs.includes("remote");
      if (isUserRemotePreferred && isJobRemote) work_mode_score = 5;
      else if (!isUserRemotePreferred && !isJobRemote) work_mode_score = 5;
      else work_mode_score = 2;

      // STEP 7: SALARY MATCH (max 5)
      const userSalary = parseSalaryLPA(seekerProfile.expectedCtc);
      const jobSalary = parseSalaryLPA(job.salary);
      if (userSalary === 0 || jobSalary === 0) salary_score = 3;
      else if (jobSalary >= userSalary) salary_score = 5;
      else if (jobSalary >= userSalary * 0.8) salary_score = 3;
      else salary_score = 1;

      // Total max = 20+40+20+10+5+5 = 100
      const finalScore = location_score + skill_score + role_score + experience_score + work_mode_score + salary_score;
      return Math.max(0, Math.min(100, finalScore));
    }

    // Match breakdown helper
    function getSkillsMatchInfo(job) {
      const jobSkillsStr = job.skills || "";
      const jobSkills = jobSkillsStr.split(',')
        .map(s => s.trim())
        .filter(Boolean);
        
      if (jobSkills.length === 0) {
        return { matched: [], missing: [] };
      }
      
      const seekerSkillsLower = seekerSkills.map(s => s.trim().toLowerCase());
      
      const matched = [];
      const missing = [];
      
      jobSkills.forEach(js => {
        const jsLower = js.toLowerCase();
        if (seekerSkillsLower.includes(jsLower) || seekerSkillsLower.some(ss => ss.includes(jsLower) || jsLower.includes(ss))) {
          matched.push(js);
        } else {
          missing.push(js);
        }
      });
      
      return { matched, missing };
    }

    // Dynamically populate Filter options based on server metadata
    function populateFilterOptions(categories, locations) {
      // 1. Populate Category dropdown
      const catSelect = document.getElementById('filterCategory');
      catSelect.innerHTML = '<option value="">All Categories</option>';
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        catSelect.appendChild(opt);
      });

      // 2. Populate Location dropdown
      const detectedStates = new Set();
      const detectedCities = new Set();
      let hasIndia = false;
      let hasOutOfIndia = false;
      let hasRemote = false;

      locations.forEach(g => {
        if (g === "India") hasIndia = true;
        else if (g === "Out of India") hasOutOfIndia = true;
        else if (g === "Remote") hasRemote = true;
        else if (indianStates.some(s => s === g)) detectedStates.add(g);
        else if (indianCities.some(c => c === g)) detectedCities.add(g);
      });

      const locSelect = document.getElementById('filterLocation');
      locSelect.innerHTML = '<option value="">All Locations</option>';
      
      if (hasIndia) {
        locSelect.appendChild(new Option("India", "India"));
      }
      if (hasRemote) {
        locSelect.appendChild(new Option("Remote", "Remote"));
      }
      if (hasOutOfIndia) {
        locSelect.appendChild(new Option("Out of India", "Out of India"));
      }

      if (detectedStates.size > 0) {
        const divider = document.createElement('option');
        divider.disabled = true;
        divider.textContent = "── States ──";
        locSelect.appendChild(divider);
        [...detectedStates].sort().forEach(state => {
          locSelect.appendChild(new Option(state, state));
        });
      }

      if (detectedCities.size > 0) {
        const divider = document.createElement('option');
        divider.disabled = true;
        divider.textContent = "── Cities ──";
        locSelect.appendChild(divider);
        [...detectedCities].sort().forEach(city => {
          locSelect.appendChild(new Option(city, city));
        });
      }
    }

        item.style.background = 'rgba(255,255,255,0.02)';
        item.style.borderColor = 'var(--border-subtle)';
        if (heart) heart.setAttribute('fill', 'none');
      }
      
      filterJobs(false);
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadJobs();
      updateFavouritesBadge();
    });

    function resetAllFilters() {
      document.getElementById('filterCategory').value = "";
      document.getElementById('filterLocation').value = "";
      document.getElementById('jobSearch').value = "";
      
      const checkboxes = document.querySelectorAll('#filterJobTypes input');
      checkboxes.forEach(cb => cb.checked = false);
      
      // Reset Favourites Filter State
      showFavouritesOnly = false;
      const item = document.getElementById('favouritesFilterItem');
      const heart = document.getElementById('favouritesHeartIcon');
      if (item) {
        item.style.background = 'rgba(255,255,255,0.02)';
        item.style.borderColor = 'var(--border-subtle)';
      }
      if (heart) {
        heart.setAttribute('fill', 'none');
      }
      
      filterJobs(false);
    }
 
    let debounceTimer;
    function debouncedFilterJobs(keepPage = false) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        filterJobs(keepPage);
      }, 300);
    }

    function filterJobs(keepPage = false) {
      if (!keepPage) {
        currentPage = 1;
      }
      fetchJobsFromServer(keepPage);
    }

    async function fetchJobsFromServer(keepPage = false) {
      const container = document.getElementById('jobsContainer');
      if (container) {
        container.innerHTML = `
          <div class="loading-container">
            <div class="wheel-and-hamster" aria-label="Orange and tan hamster running in a metal wheel" role="img">
              <div class="wheel"></div>
              <div class="hamster">
                <div class="hamster__body"></div>
                <div class="hamster__head">
                  <div class="hamster__ear"></div>
                  <div class="hamster__eye"></div>
                  <div class="hamster__nose"></div>
                </div>
                <div class="hamster__limb--fr"></div>
                <div class="hamster__limb--fl"></div>
                <div class="hamster__limb--br"></div>
                <div class="hamster__limb--bl"></div>
                <div class="hamster__tail"></div>
              </div>
              <div class="spoke"></div>
            </div>
          </div>
        `;
      }

      const searchQuery = document.getElementById('jobSearch').value;
      const selectedCategory = document.getElementById('filterCategory').value;
      const selectedLocation = document.getElementById('filterLocation').value;
      const sortVal = document.getElementById('jobSort').value;
      
      const checkedTypes = [];
      const checkboxes = document.querySelectorAll('#filterJobTypes input');
      checkboxes.forEach(cb => {
        if (cb.checked) checkedTypes.push(cb.value);
      });

      const email = localStorage.getItem('seeker_email') || '';

      const isFavouritesOnly = showFavouritesOnly;
      let savedIdsStr = '';
      if (isFavouritesOnly) {
        const savedIds = JSON.parse(localStorage.getItem('saved_jobs') || '[]');
        if (savedIds.length === 0) {
          container.innerHTML = `
            <div style="text-align: center; padding: 40px; color: var(--text-muted);">
              <h3>No Favourites Saved Yet</h3>
              <p>Click the heart icon on any job details page or card to bookmark it!</p>
            </div>
          `;
          const counterEl = document.getElementById('jobsCounter');
          if (counterEl) counterEl.textContent = '0 jobs';
          const pagEl = document.getElementById('paginationContainer');
          if (pagEl) pagEl.innerHTML = '';
          return;
        }
        savedIdsStr = savedIds.join(',');
      }

      const params = new URLSearchParams({
        page: currentPage,
        limit: jobsPerPage,
        search: searchQuery,
        category: selectedCategory,
        location: selectedLocation,
        type: checkedTypes.join(','),
        sort: sortVal,
        email: email
      });
      if (isFavouritesOnly) {
        params.append('ids', savedIdsStr);
      }

      try {
        const response = await fetch((window.API_BASE_URL || '') + `/api/jobs?${params.toString()}&t=${Date.now()}`);
        if (!response.ok) throw new Error("Failed to fetch jobs");
        const data = await response.json();
        dbJobs = data.jobs || [];
        dbTotalCount = data.total || 0;
        
        // Populate filter options only on first load
        const catSelect = document.getElementById('filterCategory');
        if (catSelect && catSelect.options.length <= 1 && data.categories) {
          populateFilterOptions(data.categories, data.locations || []);
        }

        // Update welcome banner counter
        const counterEl = document.getElementById('jobsCounter');
        if (counterEl) {
          counterEl.textContent = `Browse and search through ${dbTotalCount} active opportunities matching your criteria.`;
        }
        
        // Update feed summary sentence
        document.getElementById('feedSummaryText').textContent = `Showing ${dbJobs.length} matching jobs on this page (out of ${dbTotalCount} total)`;

        renderJobs(dbJobs);
        
        const totalPages = Math.ceil(dbTotalCount / jobsPerPage) || 1;
        renderPaginationControls(totalPages);
      } catch (err) {
        console.error("Failed to fetch jobs from server:", err);
        if (container) {
          container.innerHTML = `
            <div class="glass-panel" style="padding: 40px; text-align: center; color: var(--text-muted); border-radius: 16px;">
              Failed to load jobs from server. Please try again.
            </div>
          `;
        }
      }
    }

    function renderPaginationControls(totalPages) {
      const container = document.getElementById('paginationContainer');
      if (!container) return;
      
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }
      
      let html = `<div class="pagination-wrap">`;
      
      // Previous button
      html += `
        <button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">
          &larr; Prev
        </button>
      `;
      
      // Page numbers
      const maxVisible = 5;
      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, startPage + maxVisible - 1);
      
      if (endPage - startPage < maxVisible - 1) {
        startPage = Math.max(1, endPage - maxVisible + 1);
      }
      
      if (startPage > 1) {
        html += `<button class="pagination-btn" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) {
          html += `<span class="pagination-ellipsis">...</span>`;
        }
      }
      
      for (let i = startPage; i <= endPage; i++) {
        html += `
          <button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">
            ${i}
          </button>
        `;
      }
      
      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          html += `<span class="pagination-ellipsis">...</span>`;
        }
        html += `<button class="pagination-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }
      
      // Next button
      html += `
        <button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">
          Next &rarr;
        </button>
      `;
      
      html += `</div>`;
      container.innerHTML = html;
    }
    
    function goToPage(pageNum) {
      currentPage = pageNum;
      fetchJobsFromServer(true);
      // Scroll smoothly to top of the feed or search bar
      const searchContainer = document.querySelector('.search-container');
      if (searchContainer) {
        searchContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function getJobLogoHtml(logo) {
      const isUrl = logo && (logo.startsWith('http') || logo.startsWith('/') || logo.startsWith('data:'));
      const isGreenhouse = logo && (String(logo).toLowerCase().includes('greenhouse') || String(logo).includes('🌿') || String(logo).toLowerCase().includes('green'));
      
      if (isUrl && !isGreenhouse) {
        return `<img src="${logo}" alt="Logo" style="width:100%; height:100%; object-fit:contain; border-radius:8px;" onerror="this.outerHTML='<svg width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\' style=\'color: var(--text-muted);\'><rect x=\'2\' y=\'7\' width=\'20\' height=\'14\' rx=\'2\' ry=\'2\'></rect><path d=\'M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16\'></path></svg>'">`;
      }
      return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted);"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>`;
    }

    function renderJobs(jobs) {
      const container = document.getElementById('jobsContainer');
      container.className = 'job-cards-list'; // Force same style as dashboard list
      container.innerHTML = '';

      if (jobs.length === 0) {
        container.innerHTML = `
          <div class="glass-panel" style="padding: 40px; text-align: center; color: var(--text-muted); border-radius: 16px;">
            No jobs match your search parameters. Try resetting filters.
          </div>
        `;
        return;
      }

      jobs.forEach(job => {
        const card = document.createElement('div');
        card.className = 'glass-card job-card';

        const isLoggedIn = localStorage.getItem('seeker_logged_in') === 'true';
        const matchVal = isLoggedIn ? (job.matchScore !== undefined ? job.matchScore : getJobMatchScore(job)) : null;
        let matchPill = '';
        if (matchVal !== null && matchVal > 0) {
          let matchStyle = '';
          if (matchVal >= 80) {
            matchStyle = 'color: #10b981; border: 1px solid rgba(16, 185, 129, 0.25); background: rgba(16, 185, 129, 0.05);';
          } else if (matchVal >= 50) {
            matchStyle = 'color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.25); background: rgba(245, 158, 11, 0.05);';
          } else {
            matchStyle = 'color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.25); background: rgba(239, 68, 68, 0.05);';
          }
          matchPill = `<span class="match-badge" style="font-size: 0.7rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; ${matchStyle}">${matchVal}% Match</span>`;
        }

        // Skills snippet
        const skillsInfo = getSkillsMatchInfo(job);
        let skillsSnippet = "";
        if (isLoggedIn && skillsInfo.matched.length > 0) {
          skillsSnippet = `
            <div style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;">
              <span style="font-size: 0.7rem; font-weight: 700; color: var(--success); text-transform: uppercase; margin-right: 4px;">Matched:</span>
              ${skillsInfo.matched.slice(0, 3).map(s => `<span style="font-size: 0.72rem; padding: 2px 6px; border-radius: 4px; background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2); color: var(--success);">${s}</span>`).join('')}
              ${skillsInfo.matched.length > 3 ? `<span style="font-size: 0.7rem; color: var(--text-muted);">+${skillsInfo.matched.length - 3} more</span>` : ''}
            </div>
          `;
        } else if (job.skills) {
          const reqSkills = (typeof job.skills === 'string' ? job.skills : job.skills.join(',')).split(',').map(s => s.trim()).filter(Boolean);
          skillsSnippet = `
            <div style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;">
              <span style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-right: 4px;">Skills:</span>
              ${reqSkills.slice(0, 3).map(s => `<span style="font-size: 0.72rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle); color: var(--text-muted);">${s}</span>`).join('')}
              ${reqSkills.length > 3 ? `<span style="font-size: 0.7rem; color: var(--text-muted);">+${reqSkills.length - 3} more</span>` : ''}
            </div>
          `;
        }

        const isApplied = (JSON.parse(localStorage.getItem('applied_jobs') || '[]')).includes(job.id);
        const actionBtn = job.isSample ? `
          <button class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;" ${isApplied ? 'disabled' : ''} onclick="openDrawerFromBtn('${job.id}')">${isApplied ? 'Applied' : 'Apply'}</button>
        ` : `
          <a href="${job.applyUrl || job.apply_url || '#'}" target="_blank" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem; text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">Open</a>
        `;

        const savedIds = JSON.parse(localStorage.getItem('saved_jobs') || '[]');
        const isSaved = savedIds.includes(job.id);
        const heartSvg = isSaved ? `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#ff5b89" stroke="#ff5b89" stroke-width="2">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        ` : `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff5b89" stroke-width="2">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        `;

        card.innerHTML = `
          <div class="job-card-logo">${getJobLogoHtml(job.logo)}</div>
          <div class="job-card-info">
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2px;">
              <h3 style="margin: 0; font-size: 1.05rem; font-weight: 600;">${job.title}</h3>
              ${matchPill}
            </div>
            <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">${job.company}</div>
            <div class="job-card-meta">
              <div class="job-card-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle; margin-right: 4px; color: var(--text-muted);"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                ${job.location || 'Remote'}
              </div>
              <div class="job-card-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle; margin-right: 4px; color: var(--text-muted);"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                ${(job.salary || 'Not specified').split(' / ')[0]}
              </div>
              <div class="job-card-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle; margin-right: 4px; color: var(--text-muted);"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                ${job.type || 'Full-time'}
              </div>
            </div>
            ${skillsSnippet}
          </div>
          <div class="job-card-actions" onclick="event.stopPropagation()">
            <button onclick="openDrawerFromBtn('${job.id}')" class="btn btn-details-animated">Details</button>
            ${actionBtn}
            <button onclick="toggleSaveJobFromCard('${job.id}', event)" class="btn btn-like-card" id="like_btn_${job.id}" style="padding: 8px 10px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; background: ${isSaved ? 'rgba(255, 91, 137, 0.1)' : 'rgba(255,255,255,0.03)'}; border: 1px solid ${isSaved ? 'rgba(255, 91, 137, 0.25)' : 'var(--border-subtle)'}; color: var(--text-muted); cursor: pointer; transition: all 0.2s;" title="Save Job">
              ${heartSvg}
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function openDrawerFromBtn(id) {
      const job = dbJobs.find(j => String(j.id) === String(id) || String(j._id) === String(id));
      if (job) openDrawer(job);
    }

    function openDrawer(job) {
      currentSelectedJob = job;
      window.JobDrawer.open(job, {
        getJobLogoHtml,
        getMatchScore: getJobMatchScore,
        getSkillsMatchInfo,
        onSave: (j, checked) => {
          updateFavouritesBadge();
          // Keep list items in sync
          const btn = document.getElementById(`like_btn_${j.id}`);
          if (btn) {
            btn.innerHTML = checked ? `
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#ff5b89" stroke="#ff5b89" stroke-width="2">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
            ` : `
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff5b89" stroke-width="2">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
            `;
            btn.style.background = checked ? 'rgba(255, 91, 137, 0.1)' : 'rgba(255,255,255,0.03)';
            btn.style.borderColor = checked ? 'rgba(255, 91, 137, 0.25)' : 'var(--border-subtle)';
          }
          if (showFavouritesOnly && !checked) {
            filterJobs(true);
          }
        },
        onApply: () => applyToCurrentJob()
      });
    }

    // Stub — forward to shared drawer close
    function closeDrawer(event) {
      if (event === null || (event.target && event.target.id === 'jd_detailDrawer')) {
        window.JobDrawer.close();
      }
    }


    async function applyToCurrentJob() {
      if (!currentSelectedJob) return;
      
      const candidateName = localStorage.getItem('seeker_name') || 'Guest';
      const candidateEmail = localStorage.getItem('seeker_email');
      if (!candidateEmail) {
        alert("Please log in to apply for this job.");
        window.location.href = "login_signup.html";
        return;
      }

      try {
        const response = await fetch((window.API_BASE_URL || '') + `/api/jobs/${currentSelectedJob.id}/apply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ candidateName, candidateEmail })
        });

        if (!response.ok) {
          alert('Failed to submit application to the backend.');
          return;
        }

        const appliedJobs = JSON.parse(localStorage.getItem('applied_jobs') || '[]');
        if (!appliedJobs.includes(currentSelectedJob.id)) {
          appliedJobs.push(currentSelectedJob.id);
          localStorage.setItem('applied_jobs', JSON.stringify(appliedJobs));
        }

        // Add simple notification
        const notifications = JSON.parse(localStorage.getItem('seeker_notifications') || '[]');
        notifications.unshift({
          id: Date.now(),
          title: `Applied to ${currentSelectedJob.title}`,
          desc: `Your profile matching analysis (${getJobMatchScore(currentSelectedJob)}%) has been sent directly to ${currentSelectedJob.company}.`,
          time: "Just now",
          unread: true
        });
        localStorage.setItem('seeker_notifications', JSON.stringify(notifications));

        // Close drawer and re-render local jobs immediately for instant, non-blocking feedback
        closeDrawer(null);
        renderJobs(dbJobs);

        // Toast feedback
        const toast = document.getElementById('successToast');
        if (toast) {
          toast.style.display = 'block';
          setTimeout(() => {
            toast.style.display = 'none';
          }, 1500);
        }

        const destUrl = currentSelectedJob.applyUrl || currentSelectedJob.apply_url;
        if (destUrl && destUrl.startsWith('http')) {
          window.open(destUrl, '_blank');
        }
      } catch (err) {
        console.error('Apply error:', err);
        alert('Could not connect to the backend to apply.');
      }
    }

    function startMockForJobId(jobId) {
      const job = dbJobs.find(j => String(j.id) === String(jobId) || String(j._id) === String(jobId));
      if (job) {
        const title = encodeURIComponent(job.title || '');
        const company = encodeURIComponent(job.company || '');
        const skills = encodeURIComponent((job.skills || '').slice(0, 300));
        window.location.href = `aiinterview.html?jobId=${jobId}&jobTitle=${title}&company=${company}&jobSkills=${skills}`;
      }
    }

    function toggleSaveJobFromCard(jobId, event) {
      if (event) event.stopPropagation();
      let savedJobIds = JSON.parse(localStorage.getItem('saved_jobs') || '[]');
      const index = savedJobIds.indexOf(jobId);
      const checked = index === -1;
      
      if (checked) {
        savedJobIds.push(jobId);
      } else {
        savedJobIds.splice(index, 1);
      }
      localStorage.setItem('saved_jobs', JSON.stringify(savedJobIds));

      // Update heart icon on card
      const btn = document.getElementById(`like_btn_${jobId}`);
      if (btn) {
        btn.innerHTML = checked ? `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#ff5b89" stroke="#ff5b89" stroke-width="2">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        ` : `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff5b89" stroke-width="2">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        `;
        btn.style.background = checked ? 'rgba(255, 91, 137, 0.1)' : 'rgba(255,255,255,0.03)';
      }

      // Update drawer save state if currently open
      if (window.JobDrawer) {
        window.JobDrawer.syncLikeState(jobId, checked);
      }

      // Toast feedback
      const toast = document.getElementById("successToast");
      if (toast) {
        if (checked) {
          toast.textContent = "Job saved to your bookmarks!";
          toast.style.background = "#ff5b89";
          toast.style.boxShadow = "0 10px 20px rgba(255, 91, 137, 0.3)";
        } else {
          toast.textContent = "Job removed from bookmarks.";
          toast.style.background = "var(--bg-secondary)";
          toast.style.boxShadow = "none";
        }
        toast.style.display = 'block';
        setTimeout(() => {
          toast.style.display = 'none';
        }, 1500);
      }

      // Update Favourites Badge
      updateFavouritesBadge();

      // If favourites filter is active, filter jobs immediately
      if (showFavouritesOnly) {
        if (!checked) {
          filterJobs(true);
        }
      }
    }
  </script>
  
  <script src="../commonelements/jobDrawer.js"></script>
  <script src="../js/header.js"></script>
</body>
