<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Seeker Authentication - JobSarthi</title>
  <meta name="description"
    content="Sign in or register for a seeker account on JobSarthi to start your career journey.">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top right, #131b2e 0%, #06070a 100%);
      padding: 20px;
    }

    .auth-container {
      max-width: 480px;
      width: 100%;
      position: relative;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
      transition: var(--transition-fast);
    }

    .back-btn:hover {
      color: var(--accent-secondary);
      transform: translateX(-4px);
    }

    .auth-panel {
      padding: 40px;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 30px;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      font-family: var(--font-display);
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition-fast);
      border-bottom: 2px solid transparent;
    }

    .auth-tab.active {
      color: var(--text-main);
      border-bottom-color: var(--accent-secondary);
    }

    .form-wrapper {
      display: none;
    }

    .form-wrapper.active {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .social-auth {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .social-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 10px;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition-fast);
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-dark);
      font-size: 0.8rem;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--glass-border);
    }

    .divider:not(:empty)::before {
      margin-right: 12px;
    }

    .divider:not(:empty)::after {
      margin-left: 12px;
    }
  </style>
</head>

<body class="auth-body">
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1" style="background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, rgba(0,0,0,0) 70%);">
  </div>

  <div class="auth-container">
    <a href="../landing.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Portal Choice
    </a>

    <div class="glass-panel auth-panel">
      <div class="logo" style="justify-content: center; margin-bottom: 30px;">
        <div class="logo-icon"
          style="background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);">S</div>
        JobSarthi <span
          style="font-size: 0.85rem; padding: 2px 8px; border-radius: 99px; background: rgba(6,182,212,0.1); color: var(--accent-secondary); margin-left: 5px; font-weight:600;">Finder</span>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Log In</div>
        <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <!-- Login Form -->
      <div id="loginForm" class="form-wrapper active">
        <form onsubmit="handleAuth(event, 'login')">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required
              value="candidate@jobsarthi.ai">
          </div>
          <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label class="form-label" for="loginPassword">Password</label>
              <a href="#" style="font-size: 0.8rem; color: var(--accent-secondary);">Forgot Password?</a>
            </div>
            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required
              value="password123">
          </div>
          <button type="submit" class="btn btn-glow" style="width: 100%; margin-top: 10px;">Sign In to
            Dashboard</button>
        </form>
      </div>

      <!-- Sign Up Form -->
      <div id="signupForm" class="form-wrapper">
        <form onsubmit="handleAuth(event, 'signup')">
          <div class="form-group">
            <label class="form-label" for="signupName">Full Name</label>
            <input type="text" id="signupName" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" class="form-control" placeholder="name@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupPassword">Password</label>
            <input type="password" id="signupPassword" class="form-control" placeholder="At least 8 characters"
              required>
          </div>
          <button type="submit" class="btn btn-glow" style="width: 100%; margin-top: 10px;">Create Free Account</button>
        </form>
      </div>

      <div class="divider">or continue with</div>

      <div class="social-auth">
        <button class="social-btn">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.859-3.578-7.859-8s3.53-8 7.859-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.984 0-.743-.08-1.3-.178-1.857H12.24z" />
          </svg>
          Google
        </button>
        <button class="social-btn">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
          </svg>
          GitHub
        </button>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.auth-tab');
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');

      tabs.forEach(t => t.classList.remove('active'));

      if (tab === 'login') {
        tabs[0].classList.add('active');
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
      } else {
        tabs[1].classList.add('active');
        signupForm.classList.add('active');
        loginForm.classList.remove('active');
      }
    }

    const getApiBaseUrl = () => {
      if (window.location.hostname.includes('vercel') || window.location.protocol === 'file:') {
        return 'https://jobsarthi-backend.onrender.com';
      }
      return '';
    };
    const API_BASE_URL = getApiBaseUrl();

    async function handleAuth(event, type) {
      event.preventDefault();

      const submitBtn = event.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Connecting...';

      // Cold start warning indicator
      const warningTimer = setTimeout(() => {
        submitBtn.textContent = 'Waking up server (takes up to 30s)...';
      }, 3500);

      let body = {};
      let endpoint = '';

      if (type === 'signup') {
        const fullName = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;

        body = { fullName, email, password, role: 'jobseeker' };
        endpoint = API_BASE_URL + '/api/auth/signup';
      } else {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        body = { email, password };
        endpoint = API_BASE_URL + '/api/auth/login';
      }

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const result = await response.json();
        clearTimeout(warningTimer);

        if (!response.ok) {
          alert(result.error || 'Authentication failed. Please check your credentials.');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          return;
        }

        // Store user info in localStorage for frontend compatibility
        localStorage.setItem('seeker_logged_in', 'true');
        localStorage.setItem('seeker_name', result.user.fullName);
        localStorage.setItem('seeker_email', result.user.email);

        // Redirect to home dashboard
        window.location.href = 'index.html';
      } catch (err) {
        clearTimeout(warningTimer);
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
        console.warn('Backend server offline. Falling back to local simulation for UI testing:', err);
        localStorage.setItem('seeker_logged_in', 'true');
        localStorage.setItem('seeker_name', body.fullName || (body.email ? body.email.split('@')[0] : "Candidate"));
        localStorage.setItem('seeker_email', body.email || "candidate@jobsarthi.ai");
        window.location.href = 'index.html';
      }
    }

    // Liquid glass spotlight coordinates tracking
    document.addEventListener('mousemove', (e) => {
      const cards = document.querySelectorAll('.glass-panel, .glass-card, .portal-side, .deck-card, .info-card, .team-card, .profile-sidebar, .welcome-card');
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
      });
    });
  </script>

</body>

</html>
