<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - JobSarthi Seeker</title>
  <meta name="description" content="Connect and chat with recruiters directly from the portal.">
  <link rel="stylesheet" href="../css/main.css">
  <script>
    if (localStorage.getItem('seeker_logged_in') !== 'true') {
      window.location.replace('login_signup.html');
    }
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('light-theme');
      });
    }
  </script>
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 30px;
      margin-top: 30px;
      height: calc(100vh - 180px);
    }

    @media (max-width: 900px) {
      .messages-layout {
        grid-template-columns: 1fr;
      }

      .chat-sidebar {
        display: none;
      }
    }

    .chat-sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .chat-user-item {
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: var(--transition-fast);
      cursor: pointer;
    }

    .chat-user-item:hover,
    .chat-user-item.active {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent-primary);
    }

    body.light-theme .chat-user-item:hover,
    body.light-theme .chat-user-item.active {
      background: rgba(0, 0, 0, 0.03);
    }

    .chat-user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .chat-user-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .chat-user-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .chat-user-last-msg {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-window {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-body {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-bubble {
      max-width: 60%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .chat-bubble.incoming {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    body.light-theme .chat-bubble.incoming {
      background: rgba(0, 0, 0, 0.02);
    }

    .chat-bubble.outgoing {
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
    }

    .chat-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 12px;
      align-items: center;
    }
  </style>
</head>

<body>
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Seeker Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container">
    <div class="messages-layout">
      <!-- Sidebar chats list -->
      <div class="chat-sidebar">
        <!-- Sidebar items populated dynamically -->
      </div>

      <!-- Chat details -->
      <div class="glass-panel chat-window">
        <div class="chat-header">
          <div class="chat-user-avatar">?</div>
          <span class="chat-user-name" style="font-size: 1.05rem;">Select a Chat</span>
        </div>

        <div class="chat-body" id="chatBody">
          <!-- Chat bubbles populated dynamically -->
        </div>

        <div class="chat-footer">
          <input type="text" id="chatInput" class="form-control" placeholder="Type a message..." style="flex: 1;"
            onkeypress="handleKeyPress(event)">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/header.js"></script>
  <script>
    let messages = [];
    let conversations = {}; // grouped by recruiterEmail
    let activeChatEmail = null;
    const seekerEmail = localStorage.getItem('seeker_email');
    const seekerName = localStorage.getItem('seeker_name') || 'Candidate';

    document.addEventListener("DOMContentLoaded", () => {
      if (!seekerEmail) {
        window.location.replace('login_signup.html');
        return;
      }
      loadMessages();
      // Poll for messages
      setInterval(loadMessages, 3000);
    });

    async function loadMessages() {
      try {
        const response = await fetch(`/api/messages?email=${encodeURIComponent(seekerEmail)}&role=jobseeker`);
        if (!response.ok) return;
        const data = await response.json();
        messages = data;
        
        // Group messages by recruiter email
        const groups = {};
        messages.forEach(msg => {
          const key = msg.recruiterEmail.toLowerCase();
          if (!groups[key]) {
            groups[key] = {
              recruiterEmail: msg.recruiterEmail,
              recruiterName: msg.recruiterName,
              companyName: msg.companyName,
              messages: []
            };
          }
          groups[key].messages.push(msg);
        });

        // Sort messages in each group by timestamp ascending
        for (const key in groups) {
          groups[key].messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }

        conversations = groups;
        
        // Set default active chat if none set
        const keys = Object.keys(conversations);
        if (keys.length > 0 && !activeChatEmail) {
          activeChatEmail = keys[0];
        }

        renderSidebar();
        renderChatWindow();
      } catch (err) {
        console.error("Failed to load messages:", err);
      }
    }

    function renderSidebar() {
      const sidebar = document.querySelector('.chat-sidebar');
      if (!sidebar) return;
      sidebar.innerHTML = '';

      const keys = Object.keys(conversations);
      if (keys.length === 0) {
        sidebar.innerHTML = '<div style="padding: 20px; color: var(--text-muted); text-align: center; font-size: 0.85rem;">No conversations active. Apply to a job to start a conversation!</div>';
        return;
      }

      keys.forEach(email => {
        const conv = conversations[email];
        const lastMsgObj = conv.messages[conv.messages.length - 1];
        const lastMsgText = lastMsgObj ? lastMsgObj.text : "No messages yet";
        const isActive = email === activeChatEmail;
        const initial = conv.companyName.charAt(0).toUpperCase();

        const item = document.createElement('div');
        item.className = `glass-panel chat-user-item ${isActive ? 'active' : ''}`;
        item.onclick = () => {
          activeChatEmail = email;
          renderSidebar();
          renderChatWindow();
        };

        item.innerHTML = `
          <div class="chat-user-avatar">${initial}</div>
          <div class="chat-user-info">
            <span class="chat-user-name">${conv.companyName} HR</span>
            <span class="chat-user-last-msg">${lastMsgText}</span>
          </div>
        `;
        sidebar.appendChild(item);
      });
    }

    function renderChatWindow() {
      const chatHeader = document.querySelector('.chat-header');
      const chatBody = document.getElementById('chatBody');
      if (!chatHeader || !chatBody) return;

      if (!activeChatEmail || !conversations[activeChatEmail]) {
        chatHeader.innerHTML = `
          <div class="chat-user-avatar">?</div>
          <span class="chat-user-name" style="font-size: 1.05rem;">Select a Chat</span>
        `;
        chatBody.innerHTML = `
          <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.95rem;">
            Select a conversation from the sidebar to view messages.
          </div>
        `;
        return;
      }

      const conv = conversations[activeChatEmail];
      const initial = conv.companyName.charAt(0).toUpperCase();

      chatHeader.innerHTML = `
        <div class="chat-user-avatar">${initial}</div>
        <div style="display: flex; flex-direction: column;">
          <span class="chat-user-name" style="font-size: 1.05rem; font-weight: 600;">${conv.companyName} HR</span>
          <span style="font-size: 0.75rem; color: var(--text-muted);">${conv.recruiterName}</span>
        </div>
      `;

      // Check if scroll was at the bottom
      const isAtBottom = chatBody.scrollHeight - chatBody.clientHeight <= chatBody.scrollTop + 50;

      chatBody.innerHTML = '';
      conv.messages.forEach(msg => {
        const bubble = document.createElement('div');
        const isOutgoing = msg.sender === 'seeker';
        bubble.className = `chat-bubble ${isOutgoing ? 'outgoing' : 'incoming'}`;
        bubble.textContent = msg.text;
        chatBody.appendChild(bubble);
      });

      if (isAtBottom || chatBody.scrollTop === 0) {
        chatBody.scrollTop = chatBody.scrollHeight;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !activeChatEmail || !conversations[activeChatEmail]) return;

      const conv = conversations[activeChatEmail];
      input.value = '';

      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            seekerEmail,
            seekerName,
            recruiterEmail: conv.recruiterEmail,
            recruiterName: conv.recruiterName,
            companyName: conv.companyName,
            sender: 'seeker',
            text: text
          })
        });

        if (response.ok) {
          await loadMessages();
        } else {
          alert('Failed to send message.');
        }
      } catch (err) {
        console.error("Error sending message:", err);
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }
  </script>
</body>

</html>
