<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - JobSarthi Seeker</title>
  <meta name="description" content="Connect and chat with recruiters directly from the portal.">
  <link rel="stylesheet" href="../css/main.css">
  <script>
    if (localStorage.getItem('seeker_logged_in') !== 'true') {
      window.location.replace('login_signup.html');
    }
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme && savedTheme !== 'dark') {
      document.documentElement.classList.add(savedTheme + '-theme');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add(savedTheme + '-theme');
      });
    }
  </script>
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      margin-top: 24px;
      height: calc(100vh - 140px);
      position: relative;
    }

    /* Chats List Sidebar */
    .chat-sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding: 20px;
    }

    .chat-sidebar h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.02em;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 8px;
    }

    .chat-user-item {
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      background: var(--bg-surface);
    }

    .chat-user-item:hover {
      background: var(--bg-secondary);
      border-color: var(--border-focus);
    }

    .chat-user-item.active {
      background: var(--bg-secondary);
      border-color: var(--accent-secondary);
    }

    .chat-user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent-secondary);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .chat-user-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      overflow: hidden;
    }

    .chat-user-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .chat-user-last-msg {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main chat pane */
    .chat-window {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      padding: 0;
    }

    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-surface);
    }

    .chat-body {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg-primary);
    }

    .chat-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.45;
      animation: msgAppear 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgAppear {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .chat-bubble.incoming {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      color: var(--text-main);
    }

    .chat-bubble.outgoing {
      background: var(--accent-primary);
      color: var(--bg-primary);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .chat-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg-surface);
    }

    /* Mobile Back Button */
    .mobile-back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 8px;
      margin-right: 4px;
      align-items: center;
      justify-content: center;
    }

    /* Responsive Design for Mobile Layout (Slide view) */
    @media (max-width: 900px) {
      .messages-layout {
        grid-template-columns: 1fr;
        height: calc(100vh - 120px);
      }

      .mobile-back-btn {
        display: flex;
      }

      .chat-sidebar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        background: var(--bg-primary);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
      }

      .chat-window {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        background: var(--bg-primary);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
      }

      .messages-layout.view-sidebar .chat-sidebar {
        transform: translateX(0);
        pointer-events: auto;
        opacity: 1;
      }

      .messages-layout.view-sidebar .chat-window {
        transform: translateX(100%);
        pointer-events: none;
        opacity: 0;
      }

      .messages-layout.view-chat .chat-sidebar {
        transform: translateX(-100%);
        pointer-events: none;
        opacity: 0;
      }

      .messages-layout.view-chat .chat-window {
        transform: translateX(0);
        pointer-events: auto;
        opacity: 1;
      }
    }

    /* Custom scrollbars */
    .chat-sidebar::-webkit-scrollbar,
    .chat-body::-webkit-scrollbar {
      width: 6px;
    }
    .chat-sidebar::-webkit-scrollbar-thumb,
    .chat-body::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <!-- Liquid Glass Backdrop Blobs -->
  <div class="liquid-blob-container">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>
  </div>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Seeker Header (loaded dynamically via js/header.js) -->
  <div class="header-wrapper"></div>

  <!-- Container -->
  <main class="container">
    <div class="messages-layout view-sidebar" id="layoutContainer">
      <!-- Sidebar chats list -->
      <aside class="glass-panel chat-sidebar">
        <h2>Recruiters Inbox</h2>
        <div id="sidebarList" style="display: flex; flex-direction: column; gap: 10px;">
          <!-- Dynamically populated -->
        </div>
      </aside>

      <!-- Chat details -->
      <section class="glass-panel chat-window">
        <div class="chat-header">
          <button class="mobile-back-btn" onclick="showSidebarOnMobile()" title="Back to Inbox">←</button>
          <div class="chat-user-avatar" id="activeChatAvatar">?</div>
          <div style="display: flex; flex-direction: column;">
            <span class="chat-user-name" id="activeChatName" style="font-size: 1.05rem;">Select a Chat</span>
            <span id="activeChatSub" style="font-size: 0.75rem; color: var(--text-muted);"></span>
          </div>
        </div>

        <div class="chat-body" id="chatBody">
          <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.95rem;">
            Select a conversation from the sidebar to view messages.
          </div>
        </div>

        <div class="chat-footer">
          <input type="text" id="chatInput" class="form-control" placeholder="Type a message..." style="flex: 1;"
            onkeypress="handleKeyPress(event)" disabled>
          <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
        </div>
      </section>
    </div>
  </main>

  <script src="../js/header.js"></script>
  <script>
    let messages = [];
    let conversations = {}; // grouped by recruiterEmail
    let activeChatEmail = null;
    let renderedConversationsJSON = "";
    let renderedMessageCount = 0;
    let lastActiveChatEmail = null;

    const seekerEmail = localStorage.getItem('seeker_email');
    const seekerName = localStorage.getItem('seeker_name') || 'Candidate';

    document.addEventListener("DOMContentLoaded", () => {
      if (!seekerEmail) {
        window.location.replace('login_signup.html');
        return;
      }
      loadMessages();
      // Poll for new messages every 3 seconds
      setInterval(loadMessages, 3000);
    });

    async function loadMessages() {
      try {
        const response = await fetch(`/api/messages?email=${encodeURIComponent(seekerEmail)}&role=jobseeker`);
        if (!response.ok) return;
        const data = await response.json();
        messages = data;
        
        // Group messages by recruiter email
        const groups = {};
        messages.forEach(msg => {
          const key = msg.recruiterEmail.toLowerCase();
          if (!groups[key]) {
            groups[key] = {
              recruiterEmail: msg.recruiterEmail,
              recruiterName: msg.recruiterName,
              companyName: msg.companyName,
              messages: []
            };
          }
          groups[key].messages.push(msg);
        });

        // Sort messages in each group by timestamp ascending
        for (const key in groups) {
          groups[key].messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }

        conversations = groups;
        
        // Set default active chat if none set
        const keys = Object.keys(conversations);
        if (keys.length > 0 && !activeChatEmail) {
          activeChatEmail = keys[0];
        }

        // Check change detection for sidebar
        const currentConvsJSON = JSON.stringify(keys.map(email => ({
          email,
          companyName: conversations[email].companyName,
          lastMsgText: conversations[email].messages[conversations[email].messages.length - 1]?.text,
          active: email === activeChatEmail
        })));

        if (currentConvsJSON !== renderedConversationsJSON) {
          renderedConversationsJSON = currentConvsJSON;
          renderSidebar();
        }

        // Check change detection for chat window
        const activeConv = conversations[activeChatEmail];
        const activeMsgCount = activeConv ? activeConv.messages.length : 0;

        if (activeChatEmail !== lastActiveChatEmail || activeMsgCount !== renderedMessageCount) {
          const isChatSwitched = activeChatEmail !== lastActiveChatEmail;
          lastActiveChatEmail = activeChatEmail;
          renderedMessageCount = activeMsgCount;
          renderChatWindow(isChatSwitched);
        }
      } catch (err) {
        console.error("Failed to load messages:", err);
      }
    }

    function renderSidebar() {
      const sidebarContainer = document.getElementById('sidebarList');
      if (!sidebarContainer) return;
      sidebarContainer.innerHTML = '';

      const keys = Object.keys(conversations);
      if (keys.length === 0) {
        sidebarContainer.innerHTML = '<div style="padding: 20px; color: var(--text-muted); text-align: center; font-size: 0.85rem;">No conversations active. Apply to a job to start a conversation!</div>';
        return;
      }

      keys.forEach(email => {
        const conv = conversations[email];
        const lastMsgObj = conv.messages[conv.messages.length - 1];
        const lastMsgText = lastMsgObj ? lastMsgObj.text : "No messages yet";
        const isActive = email === activeChatEmail;
        const initial = conv.companyName.charAt(0).toUpperCase();

        const item = document.createElement('div');
        item.className = `chat-user-item ${isActive ? 'active' : ''}`;
        item.onclick = () => {
          activeChatEmail = email;
          
          // Switch to chat view on mobile
          const layout = document.getElementById('layoutContainer');
          if (layout) {
            layout.classList.remove('view-sidebar');
            layout.classList.add('view-chat');
          }
          
          // Trigger updates immediately
          loadMessages();
        };

        item.innerHTML = `
          <div class="chat-user-avatar">${initial}</div>
          <div class="chat-user-info">
            <span class="chat-user-name">${conv.companyName} HR</span>
            <span class="chat-user-last-msg">${lastMsgText}</span>
          </div>
        `;
        sidebarContainer.appendChild(item);
      });
    }

    function renderChatWindow(isChatSwitched) {
      const chatHeader = document.querySelector('.chat-header');
      const chatBody = document.getElementById('chatBody');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      if (!chatHeader || !chatBody || !chatInput || !sendBtn) return;

      if (!activeChatEmail || !conversations[activeChatEmail]) {
        document.getElementById('activeChatAvatar').textContent = '?';
        document.getElementById('activeChatName').textContent = 'Select a Chat';
        document.getElementById('activeChatSub').textContent = '';
        chatBody.innerHTML = `
          <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.95rem;">
            Select a conversation from the sidebar to view messages.
          </div>
        `;
        chatInput.disabled = true;
        sendBtn.disabled = true;
        return;
      }

      const conv = conversations[activeChatEmail];
      const initial = conv.companyName.charAt(0).toUpperCase();

      // Update Header info
      document.getElementById('activeChatAvatar').textContent = initial;
      document.getElementById('activeChatName').textContent = `${conv.companyName} HR`;
      document.getElementById('activeChatSub').textContent = conv.recruiterName || 'Active recruiter';

      chatInput.disabled = false;
      sendBtn.disabled = false;

      // Check if user is scrolled to the bottom before update
      const isAtBottom = chatBody.scrollHeight - chatBody.clientHeight <= chatBody.scrollTop + 60;

      if (isChatSwitched) {
        // If switched to a new chat, clear the body and render all messages
        chatBody.innerHTML = '';
        conv.messages.forEach(msg => {
          const bubble = document.createElement('div');
          const isOutgoing = msg.sender === 'seeker';
          bubble.className = `chat-bubble ${isOutgoing ? 'outgoing' : 'incoming'}`;
          bubble.textContent = msg.text;
          chatBody.appendChild(bubble);
        });
        chatBody.scrollTop = chatBody.scrollHeight;
      } else {
        // If same chat, check if new messages were added and only append them to avoid scroll jump
        const currentBubbles = chatBody.querySelectorAll('.chat-bubble');
        const renderedCount = currentBubbles.length;
        
        if (conv.messages.length > renderedCount) {
          // Append only the new ones
          const newMessages = conv.messages.slice(renderedCount);
          newMessages.forEach(msg => {
            const bubble = document.createElement('div');
            const isOutgoing = msg.sender === 'seeker';
            bubble.className = `chat-bubble ${isOutgoing ? 'outgoing' : 'incoming'}`;
            bubble.textContent = msg.text;
            chatBody.appendChild(bubble);
          });
          
          // Scroll to bottom if user was already at the bottom or if it was their own outgoing message
          const lastNewMessage = newMessages[newMessages.length - 1];
          if (isAtBottom || lastNewMessage.sender === 'seeker') {
            chatBody.scrollTop = chatBody.scrollHeight;
          }
        }
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !activeChatEmail || !conversations[activeChatEmail]) return;

      const conv = conversations[activeChatEmail];
      input.value = '';

      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            seekerEmail,
            seekerName,
            recruiterEmail: conv.recruiterEmail,
            recruiterName: conv.recruiterName,
            companyName: conv.companyName,
            sender: 'seeker',
            text: text
          })
        });

        if (response.ok) {
          // Immediately reload to display the new message and auto-scroll
          await loadMessages();
        } else {
          alert('Failed to send message.');
        }
      } catch (err) {
        console.error("Error sending message:", err);
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }

    function showSidebarOnMobile() {
      const layout = document.getElementById('layoutContainer');
      if (layout) {
        layout.classList.remove('view-chat');
        layout.classList.add('view-sidebar');
      }
    }
  </script>
</body>

</html>
